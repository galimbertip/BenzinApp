// ── Fuzzy match veicoli ──────────────────────────────────────────────────────
function fuzzyScore(a, b) {
  a = a.toLowerCase(); b = b.toLowerCase();
  if (a === b) return 1;
  if (b.includes(a) || a.includes(b)) return 0.8;
  const aW = a.split(/\s+/), bW = b.split(/\s+/);
  const matches = aW.filter(w => bW.some(bw => bw.includes(w) || w.includes(bw)));
  return matches.length / Math.max(aW.length, bW.length);
}

// ── CSV Parser ───────────────────────────────────────────────────────────────
// Converte un valore stringa numerico in float, gestendo virgola e punto decimale
function parseNum(raw) {
  if (!raw || !raw.trim()) return null;
  // Rimuovi spazi, simboli valuta, caratteri non numerici tranne ,.+-
  let s = raw.trim().replace(/[€$£\s]/g,"");
  // Caso europeo: 1.234,56 → 1234.56
  if (/^\d{1,3}(\.\d{3})+(,\d+)?$/.test(s)) s = s.replace(/\./g,"").replace(",",".");
  // Caso con solo virgola decimale: 1,879 o 65,50
  else if (/^\d+(,\d+)$/.test(s)) s = s.replace(",",".");
  // Già ok con punto decimale
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}

// Rileva separatore di colonna dal CSV
function detectSeparator(line) {
  const sc = (line.match(/;/g)||[]).length;
  const tc = (line.match(/\t/g)||[]).length;
  const cc = (line.match(/,/g)||[]).length;
  if (tc >= sc && tc >= cc) return "\t";
  if (sc > cc) return ";";
  return ",";
}

// Splitta una riga CSV rispettando i campi tra virgolette
function splitCSVLine(line, sep) {
  const result = [];
  let cur = "", inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQ = !inQ; continue; }
    if (ch === sep && !inQ) { result.push(cur.trim()); cur = ""; continue; }
    cur += ch;
  }
  result.push(cur.trim());
  return result;
}

function parseCSV(text) {
  // Normalizza fine riga
  text = text.replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  const lines = text.trim().split("\n").filter(l => l.trim());
  if (lines.length < 2) return { rows:[], warnings:[{line:1, warnings:["File vuoto o con una sola riga"]}], separator:"," };

  const sep = detectSeparator(lines[0]);
  const sepName = sep==="\t" ? "tab (Excel)" : sep===";" ? "punto e virgola (;)" : "virgola (,)";
  const header = splitCSVLine(lines[0], sep).map(h => h.toLowerCase().replace(/['"]/g,"").trim());

  const rows = [], warnings = [];

  for (let i = 1; i < lines.length; i++) {
    const raw = lines[i];
    if (!raw.trim()) continue;
    const cols = splitCSVLine(raw, sep);
    const obj = {}; header.forEach((h,idx) => obj[h] = (cols[idx]||"").trim());

    const rowWarnings = [];

    // Data
    const dateStr = obj["data"]||obj["date"]||"";
    const timeStr = obj["ora"]||obj["time"]||"";
    let dt = null;
    if (dateStr) {
      try {
        // Supporta GG/MM/AAAA, GG-MM-AAAA, AAAA-MM-GG
        let d,m,y;
        if (/\d{4}-\d{2}-\d{2}/.test(dateStr)) { [y,m,d]=dateStr.split("-"); }
        else { const parts=dateStr.split(/[\/\-]/); [d,m,y]=parts; }
        const timepart = timeStr||"00:00";
        const candidate = new Date(`${y}-${m.padStart(2,"0")}-${d.padStart(2,"0")}T${timepart.slice(0,5)}:00`);
        if (isNaN(candidate)) throw new Error();
        dt = candidate.toISOString();
      } catch { rowWarnings.push(`⚠️ data non riconosciuta: "${dateStr}" — lasciata vuota`); }
    }

    const kmRaw    = obj["km attuali"]||obj["km"]||"";
    const amtRaw   = obj["importo"]||"";
    const priceRaw = obj["prezzo €/litro"]||obj["prezzo €/l"]||obj["prezzo/litro"]||obj["prezzo"]||"";
    const deltaRaw = obj["km distanza percorsa"]||obj["kmdistanza percorsa"]||obj["distanza"]||"";

    const km    = parseNum(kmRaw);
    const amount= parseNum(amtRaw);
    const price = parseNum(priceRaw);
    const kmDelta=parseNum(deltaRaw);

    if (kmRaw    && km    === null) rowWarnings.push(`⚠️ km non validi: "${kmRaw}" — lasciati vuoti`);
    if (amtRaw   && amount=== null) rowWarnings.push(`⚠️ importo non valido: "${amtRaw}" — lasciato vuoto`);
    if (priceRaw && price === null) rowWarnings.push(`⚠️ prezzo non valido: "${priceRaw}" — lasciato vuoto`);

    const fuelType   = obj["carburante"]||obj["fuel"]||"Benzina";
    const vehicleRaw = obj["auto"]||obj["veicolo"]||"";

    const row = {
      id: btoa([dateStr||"", kmRaw||"", amtRaw||"", priceRaw||"", i].join("|")).replace(/[^a-zA-Z0-9]/g,"").slice(0,28),
      datetime: dt,
      fuelType,
      km,
      kmDelta,
      amount,
      pricePerLiter: price,
      vehicle: vehicleRaw,
      _vehicleRaw: vehicleRaw,
    };

    if (rowWarnings.length > 0) warnings.push({ line: i+1, warnings: rowWarnings });
    rows.push(row);
  }

  // Ricalcola kmDelta mancanti
  for (let i = 1; i < rows.length; i++) {
    if (!rows[i].kmDelta && rows[i].km && rows[i-1].km) {
      const delta = rows[i].km - rows[i-1].km;
      if (delta > 0) rows[i].kmDelta = delta;
    }
  }

  return { rows, warnings, separator: sep, separatorName: sepName };
}

// ── Normalizza nome veicolo ──────────────────────────────────────────────────
function normalizeVehicleName(raw, knownVehicles) {
  if (!raw) return { normalized: raw, suggestions: [] };
  const scored = knownVehicles.map(v => {
    const full = `${v.brand} ${v.model}`;
    return { vehicle: v, full, score: fuzzyScore(raw, full) };
  }).filter(x => x.score > 0.3).sort((a,b) => b.score - a.score);
  if (scored.length && scored[0].score > 0.75) return { normalized: scored[0].full, suggestions: [] };
  return { normalized: null, suggestions: scored.slice(0,4).map(x => x.vehicle) };
}

// ── Firebase hooks ───────────────────────────────────────────────────────────
function useFirestore() {
  const [ready, setReady] = useState(!!window.__firestore);
  useEffect(() => {
    if (window.__firestore) return;
    window.addEventListener("firebase-ready", () => setReady(true), {once:true});
  }, []);
  return ready ? window.__firestore : null;
}

function useRefuels(fs) {
  const [refuels, setRefuels] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    if (!fs) return;
    const {db, collection, query, orderBy, onSnapshot} = fs;
    const q = query(collection(db,"refuels"), orderBy("datetime","asc"));
    const unsub = onSnapshot(q, snap => {
      setRefuels(snap.docs.map(d => ({id:d.id,...d.data()})));
      setLoading(false);
    }, err => { console.error(err); setLoading(false); });
    return unsub;
  }, [fs]);
  return [refuels, loading];
}

    if (!fs) return;
    const {db, doc, collection, onSnapshot} = fs;
    const unsub = onSnapshot(doc(collection(db,"settings"),"vehicle"), snap => {

    });
    return unsub;
  }, [fs]);
  const setVehicle = async (v) => { await saveVehicle(fs, v); };
  return [vehicle, setVehicle];
}

// ── Charts ───────────────────────────────────────────────────────────────────
function BarChart({data,color="#f59e0b",valueFormatter=v=>v,labelKey="label",valueKey="value"}) {
  const max = Math.max(...data.map(d=>d[valueKey]||0),1);
  return (
    <div style={{display:"flex",alignItems:"flex-end",gap:4,height:100,marginTop:8}}>
      {data.map((d,i)=>(
        <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
          <div style={{fontSize:9,color:"#94a3b8",textAlign:"center"}}>{valueFormatter(d[valueKey])}</div>
          <div style={{width:"100%",background:color,borderRadius:"4px 4px 0 0",height:`${((d[valueKey]||0)/max)*72}px`,minHeight:d[valueKey]>0?3:0}}/>
          <div style={{fontSize:9,color:"#64748b",textAlign:"center",whiteSpace:"nowrap"}}>{d[labelKey]}</div>
        </div>
      ))}
    </div>
  );
}

function LineChart({data,color="#22d3ee",labelKey="label",valueKey="value"}) {
  const vals = data.map(d=>d[valueKey]||0);
  const max = Math.max(...vals,1), min = Math.min(...vals.filter(v=>v>0),max);
  const range = max-min||1, H=80, W=100;
  const pts = data.map((d,i)=>{
    const x = data.length<2?W/2:(i/(data.length-1))*W;
    const y = d[valueKey]>0?H-((d[valueKey]-min)/range)*(H-10):H;
    return `${x},${y}`;
  }).join(" ");
  return (
    <div>
      <svg viewBox={`0 0 100 ${H}`} style={{width:"100%",height:90}} preserveAspectRatio="none">
        <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round"/>
        {data.map((d,i)=>{
          const x=data.length<2?W/2:(i/(data.length-1))*W;
          const y=d[valueKey]>0?H-((d[valueKey]-min)/range)*(H-10):H;
          return d[valueKey]>0?<circle key={i} cx={x} cy={y} r="2.5" fill={color}/>:null;
        })}
      </svg>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
        {data.map((d,i)=><div key={i} style={{fontSize:9,color:"#64748b",textAlign:"center",flex:1}}>{d[labelKey]}</div>)}
      </div>
    </div>
  );
}

function AddRefuelModal({vehicle,lastKm,onSave,onClose}) {

  const [amount,setAmount]=useState("");
  const [price,setPrice]=useState("");
  const [saving,setSaving]=useState(false);
  const kmDelta = km&&lastKm?Math.max(0,parseFloat(km)-lastKm):0;
  const inp={background:"#0f172a",color:"#e2e8f0",border:"1px solid #334155",borderRadius:8,padding:"10px 12px",width:"100%",fontSize:15,boxSizing:"border-box"};
  const save=async()=>{
    if(!km||!amount||!price){alert("Compila tutti i campi obbligatori (*)");return;}
    if(parseFloat(km)<(lastKm||0)){if(!confirm(`I km inseriti (${km}) sono minori degli ultimi registrati (${lastKm}). Continuare?`))return;}
    setSaving(true);
    await onSave({id:crypto.randomUUID(),datetime:nowISO(),fuelType,km:parseFloat(km),kmDelta,amount:parseFloat(amount),pricePerLiter:parseFloat(price),vehicle:vehicle?`${vehicle.brand} ${vehicle.model}`:""});
    setSaving(false);
  };
  return (
    <Modal onClose={onClose} title="⛽ Nuovo Rifornimento">
      <div style={{marginBottom:12}}>
        <div style={{fontSize:12,color:"#94a3b8",marginBottom:4}}>📅 Data e ora</div>
        <div style={{background:"#0f172a",borderRadius:8,padding:"10px 12px",fontSize:14,color:"#64748b"}}>{new Date().toLocaleString("it-IT")} (automatico)</div>
      </div>
      {vehicle&&<div style={{marginBottom:12}}><div style={{fontSize:12,color:"#94a3b8",marginBottom:4}}>🚗 Veicolo</div><div style={{background:"#0f172a",borderRadius:8,padding:"10px 12px",fontSize:14,color:"#64748b"}}>{vehicle.brand} {vehicle.model}{vehicle.targa?` · ${vehicle.targa}`:""}</div></div>}
      <div style={{marginBottom:12}}>
        <div style={{fontSize:12,color:"#94a3b8",marginBottom:4}}>⛽ Tipo carburante</div>
        <select value={fuelType} onChange={e=>setFuelType(e.target.value)} style={inp}>{FUEL_TYPES.map(f=><option key={f}>{f}</option>)}</select>
      </div>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:12,color:"#94a3b8",marginBottom:4}}>🛣️ Km attuali *</div>
        <input type="number" value={km} onChange={e=>setKm(e.target.value)} placeholder={lastKm?`Ultimo: ${lastKm.toLocaleString("it-IT")} km`:"es. 45230"} style={inp}/>
        {kmDelta>0&&<div style={{fontSize:12,color:"#22d3ee",marginTop:4}}>📍 Percorsi dall'ultimo: {kmDelta.toLocaleString("it-IT")} km</div>}
      </div>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:12,color:"#94a3b8",marginBottom:4}}>💶 Importo pagato (€) *</div>
        <input type="number" step="0.01" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="es. 65.50" style={inp}/>
      </div>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:12,color:"#94a3b8",marginBottom:4}}>📊 Prezzo al litro (€/L) *</div>
        <input type="number" step="0.001" value={price} onChange={e=>setPrice(e.target.value)} placeholder="es. 1.879" style={inp}/>
      </div>
      {amount&&price&&<div style={{background:"#0f172a",borderRadius:8,padding:10,marginBottom:16,fontSize:13,color:"#94a3b8"}}>🔢 Litri stimati: <span style={{color:"#f59e0b",fontWeight:700}}>{(parseFloat(amount)/parseFloat(price)).toFixed(2)} L</span></div>}

      </button>
    </Modal>
  );
}

// ── Stats Tab ─────────────────────────────────────────────────────────────────
function StatsTab({refuels}) {
  const [view,setView]=useState("km_year");
  const [selYear,setSelYear]=useState(null);
  const years=useMemo(()=>[...new Set(refuels.map(r=>new Date(r.datetime).getFullYear()))].sort(),[refuels]);
  const yr=selYear||(years.length?years[years.length-1]:new Date().getFullYear());

  const agg=(fn)=>useMemo(fn,[refuels,yr]);

  const kmByYear=useMemo(()=>{const m={};refuels.forEach(r=>{const y=new Date(r.datetime).getFullYear();if(!m[y])m[y]={min:Infinity,max:-Infinity};if(r.km>0){m[y].min=Math.min(m[y].min,r.km);m[y].max=Math.max(m[y].max,r.km);}});return Object.entries(m).map(([y,v])=>({label:y,value:v.max===-Infinity?0:v.max-(v.min===Infinity?0:v.min)})).sort((a,b)=>a.label-b.label);},[refuels]);
  const kmByMonth=useMemo(()=>{const m={};refuels.filter(r=>new Date(r.datetime).getFullYear()===yr&&r.kmDelta>0).forEach(r=>{const mo=new Date(r.datetime).getMonth();m[mo]=(m[mo]||0)+r.kmDelta;});return MONTHS_IT.map((l,i)=>({label:l,value:m[i]||0}));},[refuels,yr]);
  const priceMonth=useMemo(()=>{const m={};refuels.filter(r=>new Date(r.datetime).getFullYear()===yr&&r.pricePerLiter>0).forEach(r=>{const mo=new Date(r.datetime).getMonth();if(!m[mo])m[mo]=[];m[mo].push(r.pricePerLiter);});return MONTHS_IT.map((l,i)=>({label:l,value:m[i]?m[i].reduce((s,v)=>s+v,0)/m[i].length:0}));},[refuels,yr]);
  const priceYear=useMemo(()=>{const m={};refuels.filter(r=>r.pricePerLiter>0).forEach(r=>{const y=new Date(r.datetime).getFullYear();if(!m[y])m[y]=[];m[y].push(r.pricePerLiter);});return Object.entries(m).map(([y,a])=>({label:y,value:a.reduce((s,v)=>s+v,0)/a.length})).sort((a,b)=>a.label-b.label);},[refuels]);
  const spesaMonth=useMemo(()=>{const m={};refuels.filter(r=>new Date(r.datetime).getFullYear()===yr).forEach(r=>{const mo=new Date(r.datetime).getMonth();m[mo]=(m[mo]||0)+(r.amount||0);});return MONTHS_IT.map((l,i)=>({label:l,value:m[i]||0}));},[refuels,yr]);
  const spesaYear=useMemo(()=>{const m={};refuels.forEach(r=>{const y=new Date(r.datetime).getFullYear();m[y]=(m[y]||0)+(r.amount||0);});return Object.entries(m).map(([y,v])=>({label:y,value:v})).sort((a,b)=>a.label-b.label);},[refuels]);
  const consumoMonth=useMemo(()=>{const m={};refuels.filter(r=>new Date(r.datetime).getFullYear()===yr&&r.amount>0&&r.kmDelta>0&&r.pricePerLiter>0).forEach(r=>{const mo=new Date(r.datetime).getMonth();if(!m[mo])m[mo]=[];m[mo].push(r.amount/r.pricePerLiter/r.kmDelta*100);});return MONTHS_IT.map((l,i)=>({label:l,value:m[i]?m[i].reduce((s,v)=>s+v,0)/m[i].length:0}));},[refuels,yr]);

  const views=[{id:"km_year",l:"🛣️ Km/Anno"},{id:"km_month",l:"📅 Km/Mese"},{id:"price_month",l:"💶 Prezzo/Mese"},{id:"price_year",l:"📈 Prezzo/Anno"},{id:"spesa_month",l:"🧾 Spesa/Mese"},{id:"spesa_year",l:"🧾 Spesa/Anno"},{id:"consumo",l:"⚡ Consumo"}];
  const needsYear=["km_month","price_month","spesa_month","consumo"].includes(view);

  if(!refuels.length) return <div style={{textAlign:"center",color:"#64748b",padding:40}}><div style={{fontSize:48}}>📊</div><div style={{marginTop:12}}>Aggiungi rifornimenti per le statistiche!</div></div>;

  return (
    <div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
        {views.map(v=><button key={v.id} onClick={()=>setView(v.id)} style={{background:view===v.id?"#7c3aed":"#1e293b",color:"#e2e8f0",border:"none",borderRadius:20,padding:"6px 12px",cursor:"pointer",fontSize:12,fontWeight:view===v.id?700:400}}>{v.l}</button>)}
      </div>
      {needsYear&&<div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>{years.map(y=><button key={y} onClick={()=>setSelYear(y)} style={{background:yr===y?"#f59e0b":"#1e293b",color:yr===y?"#000":"#e2e8f0",border:"none",borderRadius:20,padding:"5px 14px",cursor:"pointer",fontSize:13,fontWeight:700}}>{y}</button>)}</div>}
      {view==="km_year"&&<StatCard title="🛣️ Km/anno" sub="Distanza totale per anno"><BarChart data={kmByYear} color="#3b82f6" valueFormatter={v=>v>0?`${(v/1000).toFixed(1)}k`:"0"}/><StatTable rows={kmByYear.map(d=>({Anno:d.label,"Km":d.value>0?`${d.value.toLocaleString("it-IT")} km`:"N/D"}))}/></StatCard>}
      {view==="km_month"&&<StatCard title={`📅 Km/mese — ${yr}`} sub="Distanza mensile"><BarChart data={kmByMonth} color="#3b82f6" valueFormatter={v=>v>0?`${v}`:"–"}/><StatTable rows={kmByMonth.filter(d=>d.value>0).map(d=>({Mese:d.label,"Km":`${d.value.toLocaleString("it-IT")} km`}))}/></StatCard>}
      {view==="price_month"&&<StatCard title={`💶 Prezzo/mese — ${yr}`} sub="Prezzo medio al litro"><LineChart data={priceMonth} color="#f59e0b"/><StatTable rows={priceMonth.filter(d=>d.value>0).map(d=>({Mese:d.label,"€/L":`€ ${d.value.toFixed(3)}`}))}/></StatCard>}
      {view==="price_year"&&<StatCard title="📈 Prezzo/anno" sub="Prezzo medio al litro per anno"><LineChart data={priceYear} color="#f59e0b"/><StatTable rows={priceYear.map(d=>({Anno:d.label,"€/L medio":`€ ${d.value.toFixed(3)}`}))}/></StatCard>}
      {view==="spesa_month"&&<StatCard title={`🧾 Spesa/mese — ${yr}`} sub="Importo mensile"><BarChart data={spesaMonth} color="#ec4899" valueFormatter={v=>v>0?`€${v.toFixed(0)}`:"–"}/><StatTable rows={spesaMonth.filter(d=>d.value>0).map(d=>({Mese:d.label,Spesa:`€ ${d.value.toFixed(2)}`}))}/></StatCard>}
      {view==="spesa_year"&&<StatCard title="🧾 Spesa/anno" sub="Spesa totale per anno"><BarChart data={spesaYear} color="#ec4899" valueFormatter={v=>`€${v.toFixed(0)}`}/><StatTable rows={spesaYear.map(d=>({Anno:d.label,Spesa:`€ ${d.value.toFixed(2)}`}))}/></StatCard>}
      {view==="consumo"&&<StatCard title={`⚡ Consumo/mese — ${yr}`} sub="L/100km per mese"><LineChart data={consumoMonth} color="#22d3ee"/><StatTable rows={consumoMonth.filter(d=>d.value>0).map(d=>({Mese:d.label,"L/100km":`${d.value.toFixed(2)} L`}))}/></StatCard>}
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const fs = useFirestore();
  const [refuels, loadingRefuels] = useRefuels(fs);
  const [vehicle, setVehicle] = useVehicle(fs);
  const [tab,setTab]=useState("dashboard");
  const [showAdd,setShowAdd]=useState(false);
  const [showVehicle,setShowVehicle]=useState(false);
  const [showImport,setShowImport]=useState(false);
  const [notif,setNotif]=useState(null);

  const notify=(msg,type="success")=>{setNotif({msg,type});setTimeout(()=>setNotif(null),3500);};

  const handleSaveRefuel=async(r)=>{
    try{await saveRefuel(fs,r);notify("✅ Rifornimento salvato!");}
    catch(e){notify("❌ Errore salvataggio: "+e.message,"error");}
  };

  const handleDeleteRefuel=async(id)=>{
    if(!confirm("Eliminare questo rifornimento?"))return;
    try{await deleteRefuel(fs,id);notify("Eliminato","error");}
    catch(e){notify("❌ Errore: "+e.message,"error");}
  };

  const handleImport=async(rows)=>{
    try{
      for(const r of rows) await saveRefuel(fs,r);
      notify(`✅ ${rows.length} rifornimenti importati!`);
      setShowImport(false);
    }catch(e){notify("❌ Errore importazione: "+e.message,"error");}
  };

  const [showExportModal,setShowExportModal]=useState(false);

  const exportCSV=(fmt)=>{
    // fmt: "standard" | "excel_it" | "gfogli"
    const n = v => (v===null||v===undefined) ? "" : v;
    // Excel IT: sep=; decimale=,
    // Google Fogli / Standard: sep=, decimale=.
    const isIT = fmt==="excel_it";
    const isGF = fmt==="gfogli";
    const sep = isIT ? ";" : ",";
    const dec = isIT ? (v => n(v).toString().replace(".",",")) : (v => n(v));
    const q = v => `"${v}"`;

    const cols = ["data","ora","km attuali","km distanza percorsa","importo","prezzo €/litro","carburante","auto"];
    const header = cols.join(sep);
    const dataRows = refuels.map(r => [
      formatDate(r.datetime),
      formatTime(r.datetime),
      dec(r.km),
      dec(r.kmDelta),
      dec(r.amount),
      dec(r.pricePerLiter),
      r.fuelType||"",
      q(r.vehicle||""),
    ].join(sep));

    const ext = isIT ? "csv" : "csv";
    const mime = "text/csv;charset=utf-8;";
    // BOM per Excel italiano (riconosce UTF-8)
    const bom = isIT ? "\uFEFF" : "";
    const blob=new Blob([bom+[header,...dataRows].join("\n")],{type:mime});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=`rifornimenti_${fmt}.csv`;
    a.click();
    setShowExportModal(false);
  };

  const totalSpent=refuels.reduce((s,r)=>s+(r.amount||0),0);
  const totalKm=refuels.length>1?refuels[refuels.length-1].km-refuels[0].km:0;
  const avgPrice=refuels.length?refuels.reduce((s,r)=>s+(r.pricePerLiter||0),0)/refuels.length:0;
  const valid=refuels.filter(r=>r.amount>0&&r.kmDelta>0&&r.pricePerLiter>0);
  const avgCons=valid.length?valid.reduce((s,r)=>s+(r.amount/r.pricePerLiter/r.kmDelta*100),0)/valid.length:0;
  const lastKm=refuels.length?refuels[refuels.length-1].km:0;

  const tabs=[{id:"dashboard",label:"📊",title:"Dashboard"},{id:"stats",label:"📈",title:"Statistiche"},{id:"history",label:"📋",title:"Storico"},{id:"vehicle",label:"🚗",title:"Veicolo"}];

  if(!fs||loadingRefuels) return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:16}}>
      <div style={{fontSize:48}}>⛽</div>
      <div style={{color:"#64748b"}}>{!fs?"Connessione a Firebase...":"Caricamento dati..."}</div>
    </div>
  );

  return (
    <div style={{fontFamily:"system-ui,sans-serif",background:"#0f172a",minHeight:"100vh",color:"#e2e8f0",maxWidth:480,margin:"0 auto"}}>
      <div style={{background:"linear-gradient(135deg,#1e40af,#7c3aed)",padding:"20px 16px 0",position:"sticky",top:0,zIndex:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingBottom:12}}>
          <div>
            <div style={{fontSize:20,fontWeight:700}}>⛽ BenzinApp</div>
            {vehicle&&<div style={{fontSize:12,opacity:.85,marginTop:2}}>{vehicle.brand} {vehicle.model}{vehicle.targa?` · ${vehicle.targa}`:""}</div>}
            {!vehicle&&<div style={{fontSize:12,opacity:.6,marginTop:2}}>Nessun veicolo impostato</div>}
          </div>
          <button onClick={()=>setShowAdd(true)} style={{background:"#f59e0b",color:"#000",border:"none",borderRadius:12,padding:"10px 16px",fontWeight:700,cursor:"pointer",fontSize:14}}>+ Rifornimento</button>
        </div>
        <div style={{display:"flex"}}>
          {tabs.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"transparent",color:"#fff",border:"none",borderBottom:tab===t.id?"3px solid #f59e0b":"3px solid transparent",padding:"8px 4px",cursor:"pointer",fontSize:12,fontWeight:tab===t.id?700:400}}>
              {t.label} {t.title}
            </button>
          ))}
        </div>
      </div>

      {notif&&<div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",background:notif.type==="error"?"#dc2626":"#16a34a",color:"#fff",borderRadius:10,padding:"10px 20px",zIndex:999,fontSize:14,fontWeight:600,boxShadow:"0 4px 20px rgba(0,0,0,0.4)",whiteSpace:"nowrap"}}>{notif.msg}</div>}

      <div style={{padding:16}}>
        {tab==="dashboard"&&(
          <div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
              {[{label:"Totale speso",value:`€ ${totalSpent.toFixed(2)}`,icon:"💶"},{label:"Km percorsi",value:`${totalKm.toFixed(0)} km`,icon:"🛣️"},{label:"Prezzo medio",value:`€ ${avgPrice.toFixed(3)}/L`,icon:"📈"},{label:"Consumo medio",value:avgCons>0?`${avgCons.toFixed(1)} L/100km`:"N/D",icon:"⚡"}].map((s,i)=>(
                <div key={i} style={{background:"#1e293b",borderRadius:14,padding:16}}>
                  <div style={{fontSize:22}}>{s.icon}</div>
                  <div style={{fontSize:18,fontWeight:700,marginTop:6}}>{s.value}</div>
                  <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{s.label}</div>
                </div>
              ))}
            </div>
            <div style={{background:"#1e293b",borderRadius:14,padding:16,marginBottom:16}}>
              <div style={{fontWeight:700,marginBottom:10,fontSize:14}}>📅 Ultimi rifornimenti</div>
              {refuels.length===0&&<div style={{color:"#64748b",fontSize:13}}>Nessun rifornimento. Aggiungine uno!</div>}
              {[...refuels].slice(-5).reverse().map(r=>(
                <div key={r.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #334155"}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:600}}>{formatDate(r.datetime)} · {r.fuelType}</div>
                    <div style={{fontSize:11,color:"#94a3b8"}}>{r.kmDelta>0?`+${r.kmDelta} km`:""} {r.vehicle?`· ${r.vehicle}`:""}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{color:"#f59e0b",fontWeight:700}}>€ {(r.amount||0).toFixed(2)}</div>
                    <div style={{fontSize:11,color:"#94a3b8"}}>€ {(r.pricePerLiter||0).toFixed(3)}/L</div>
                  </div>
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setShowImport(true)} style={{flex:1,background:"#334155",color:"#e2e8f0",border:"none",borderRadius:10,padding:12,cursor:"pointer",fontSize:13,fontWeight:600}}>📥 Importa CSV</button>
              <button onClick={()=>setShowExportModal(true)} style={{flex:1,background:"#334155",color:"#e2e8f0",border:"none",borderRadius:10,padding:12,cursor:"pointer",fontSize:13,fontWeight:600}}>📤 Esporta CSV</button>
            </div>
            <div style={{marginTop:8,fontSize:11,color:"#475569",textAlign:"center"}}>☁️ Dati sincronizzati su Firebase · disponibili su tutti i dispositivi</div>
          </div>
        )}
        {tab==="stats"&&<StatsTab refuels={refuels}/>}
        {tab==="history"&&(
          <div>
            <div style={{fontWeight:700,marginBottom:12}}>📋 Storico ({refuels.length})</div>
            {refuels.length===0&&<div style={{color:"#64748b",fontSize:13}}>Nessun rifornimento registrato.</div>}
            {[...refuels].reverse().map(r=>(
              <div key={r.id} style={{background:"#1e293b",borderRadius:12,padding:14,marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:15}}>{formatDate(r.datetime)} {formatTime(r.datetime)}</div>
                    <div style={{fontSize:12,color:"#94a3b8",marginTop:2}}>{r.fuelType}{r.vehicle?` · ${r.vehicle}`:""}</div>
                  </div>
                  <button onClick={()=>handleDeleteRefuel(r.id)} style={{background:"transparent",border:"none",color:"#ef4444",cursor:"pointer",fontSize:18,padding:0}}>🗑️</button>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginTop:10}}>
                  {[{l:"Km attuali",v:r.km?`${r.km.toLocaleString("it-IT")} km`:"-"},{l:"Percorsi",v:r.kmDelta>0?`+${r.kmDelta} km`:"-"},{l:"Importo",v:`€ ${(r.amount||0).toFixed(2)}`}].map((x,i)=>(
                    <div key={i} style={{background:"#0f172a",borderRadius:8,padding:8,textAlign:"center"}}>
                      <div style={{fontSize:13,fontWeight:700,color:"#f59e0b"}}>{x.v}</div>
                      <div style={{fontSize:10,color:"#64748b",marginTop:2}}>{x.l}</div>
                    </div>
                  ))}
                </div>
                <div style={{marginTop:8,fontSize:12,color:"#94a3b8"}}>€ {(r.pricePerLiter||0).toFixed(3)}/litro</div>
              </div>
            ))}
          </div>
        )}
        {tab==="vehicle"&&(
          <div>
            <div style={{fontWeight:700,marginBottom:12}}>🚗 Il mio Veicolo</div>
            {vehicle?(
              <div style={{background:"#1e293b",borderRadius:14,padding:20,marginBottom:16}}>
                <div style={{fontSize:22,marginBottom:8}}>🚘</div>
                <div style={{fontSize:20,fontWeight:700}}>{vehicle.brand} {vehicle.model}</div>
                <div style={{color:"#94a3b8",marginTop:4}}>{vehicle.year?`${vehicle.year} · `:""}{vehicle.fuel}{vehicle.targa?` · ${vehicle.targa}`:""}</div>
                <div style={{marginTop:8,fontSize:12,color:"#475569"}}>☁️ Sincronizzato su tutti i dispositivi</div>
                <button onClick={()=>setVehicle(null).then?setVehicle(null):setVehicle(null)} style={{marginTop:14,background:"#dc2626",color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",cursor:"pointer",fontSize:13}} onClick={async()=>{await setVehicle(null);notify("Veicolo rimosso","error");}}>Rimuovi veicolo</button>
              </div>
            ):(
              <div style={{background:"#1e293b",borderRadius:14,padding:20,marginBottom:16,color:"#64748b"}}>Nessun veicolo selezionato.</div>
            )}
            <button onClick={()=>setShowVehicle(true)} style={{width:"100%",background:"linear-gradient(135deg,#1e40af,#7c3aed)",color:"#fff",border:"none",borderRadius:12,padding:14,cursor:"pointer",fontSize:15,fontWeight:700}}>
              🔍 Seleziona veicolo
            </button>
          </div>
        )}
      </div>

      {showExportModal&&(
        <Modal onClose={()=>setShowExportModal(false)} title="📤 Esporta CSV">
          <div style={{fontSize:13,color:"#94a3b8",marginBottom:16}}>Scegli il formato in base a dove vuoi aprire il file:</div>
          {[
            {id:"standard", icon:"🌐", label:"Standard / Re-import app", desc:"Virgola (,) separatore · Punto (.) decimale · Compatibile con questa app e la maggior parte dei software"},
            {id:"excel_it", icon:"📗", label:"Excel italiano", desc:"Punto e virgola (;) separatore · Virgola (,) decimale · BOM UTF-8 incluso · Si apre correttamente in Excel con impostazioni italiane"},
            {id:"gfogli",   icon:"📊", label:"Google Fogli", desc:"Virgola (,) separatore · Punto (.) decimale · Ottimale per importare in Google Fogli"},
          ].map(f=>(
            <button key={f.id} onClick={()=>exportCSV(f.id)}
              style={{width:"100%",background:"#0f172a",border:"1px solid #334155",borderRadius:12,padding:14,cursor:"pointer",marginBottom:10,textAlign:"left",color:"#e2e8f0"}}>
              <div style={{fontSize:16,fontWeight:700,marginBottom:4}}>{f.icon} {f.label}</div>
              <div style={{fontSize:12,color:"#64748b"}}>{f.desc}</div>
            </button>
          ))}
        </Modal>
      )}
      {showAdd&&<AddRefuelModal vehicle={vehicle} lastKm={lastKm} onSave={async r=>{await handleSaveRefuel(r);setShowAdd(false);}} onClose={()=>setShowAdd(false)}/>}
      {showVehicle&&<VehicleModal onSelect={async v=>{await setVehicle(v);notify(`🚗 Veicolo: ${v.brand} ${v.model}`);setShowVehicle(false);}} onClose={()=>setShowVehicle(false)}/>}
      {showImport&&<ImportModal onImport={handleImport} onClose={()=>setShowImport(false)} existingVehicle={vehicle}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
