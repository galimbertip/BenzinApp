<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>⛽ Fuel Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f172a; color: #e2e8f0; font-family: system-ui, sans-serif; }
    input, select { outline: none; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    const FUEL_TYPES = ["Benzina","Diesel","GPL","Metano","Elettrico","Ibrido"];
    const MONTHS_IT = ["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"];
    const FUEL_MAP = { G:"Benzina", D:"Diesel", E:"Elettrico", H:"Ibrido", B:"Ibrido" };
    const fuelLabel = (f) => FUEL_MAP[f] || f || "N/D";
    const formatDate = (d) => d ? new Date(d).toLocaleDateString("it-IT") : "";
    const formatTime = (d) => d ? new Date(d).toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"}) : "";
    const nowISO = () => new Date().toISOString();

    function useStorage(key, def) {
      const [val, setVal] = useState(() => {
        try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : def; } catch { return def; }
      });
      const set = (v) => {
        const next = typeof v === "function" ? v(val) : v;
        setVal(next);
        try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
      };
      return [val, set];
    }

    function BarChart({ data, color="#f59e0b", valueFormatter=v=>v, labelKey="label", valueKey="value" }) {
      const max = Math.max(...data.map(d => d[valueKey]||0), 1);
      return (
        <div style={{display:"flex",alignItems:"flex-end",gap:4,height:100,marginTop:8}}>
          {data.map((d,i) => (
            <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
              <div style={{fontSize:9,color:"#94a3b8",textAlign:"center"}}>{valueFormatter(d[valueKey])}</div>
              <div style={{width:"100%",background:color,borderRadius:"4px 4px 0 0",height:`${((d[valueKey]||0)/max)*72}px`,minHeight:d[valueKey]>0?3:0}} />
              <div style={{fontSize:9,color:"#64748b",textAlign:"center",whiteSpace:"nowrap"}}>{d[labelKey]}</div>
            </div>
          ))}
        </div>
      );
    }

    function LineChart({ data, color="#22d3ee", valueFormatter=v=>v, labelKey="label", valueKey="value" }) {
      const max = Math.max(...data.map(d=>d[valueKey]||0), 1);
      const min = Math.min(...data.map(d=>d[valueKey]||0).filter(v=>v>0), max);
      const range = max-min||1;
      const H=80, W=100;
      const pts = data.map((d,i) => {
        const x = data.length<2 ? W/2 : (i/(data.length-1))*W;
        const y = d[valueKey]>0 ? H-((d[valueKey]-min)/range)*(H-10) : H;
        return `${x},${y}`;
      }).join(" ");
      return (
        <div>
          <svg viewBox={`0 0 100 ${H}`} style={{width:"100%",height:90}} preserveAspectRatio="none">
            <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round"/>
            {data.map((d,i) => {
              const x = data.length<2 ? W/2 : (i/(data.length-1))*W;
              const y = d[valueKey]>0 ? H-((d[valueKey]-min)/range)*(H-10) : H;
              return d[valueKey]>0 ? <circle key={i} cx={x} cy={y} r="2.5" fill={color}/> : null;
            })}
          </svg>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
            {data.map((d,i)=><div key={i} style={{fontSize:9,color:"#64748b",textAlign:"center",flex:1}}>{d[labelKey]}</div>)}
          </div>
        </div>
      );
    }

    function StatCard({title,sub,children}) {
      return (
        <div style={{background:"#1e293b",borderRadius:14,padding:16,marginBottom:16}}>
          <div style={{fontWeight:700,fontSize:15}}>{title}</div>
          <div style={{fontSize:12,color:"#64748b",marginBottom:8}}>{sub}</div>
          {children}
        </div>
      );
    }

    function StatTable({rows}) {
      if(!rows.length) return <div style={{fontSize:12,color:"#64748b",marginTop:8}}>Nessun dato.</div>;
      const cols = Object.keys(rows[0]);
      return (
        <div style={{marginTop:12,overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead><tr>{cols.map(c=><th key={c} style={{textAlign:"left",color:"#64748b",padding:"4px 6px",borderBottom:"1px solid #334155"}}>{c}</th>)}</tr></thead>
            <tbody>{rows.map((r,i)=><tr key={i}>{cols.map(c=><td key={c} style={{padding:"5px 6px",borderBottom:"1px solid #1e293b",color:"#e2e8f0"}}>{r[c]}</td>)}</tr>)}</tbody>
          </table>
        </div>
      );
    }

    function Modal({children,title,onClose}) {
      return (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div style={{background:"#1e293b",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:480,maxHeight:"90vh",overflowY:"auto",padding:20}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div style={{fontWeight:700,fontSize:17}}>{title}</div>
              <button onClick={onClose} style={{background:"#334155",color:"#e2e8f0",border:"none",borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:18}}>×</button>
            </div>
            {children}
          </div>
        </div>
      );
    }

    function AddRefuelModal({vehicle,lastKm,onSave,onClose}) {
      const [fuelType,setFuelType]=useState(FUEL_TYPES[0]);
      const [km,setKm]=useState("");
      const [amount,setAmount]=useState("");
      const [price,setPrice]=useState("");
      const kmDelta = km&&lastKm ? Math.max(0,parseFloat(km)-lastKm) : 0;
      const inp={background:"#0f172a",color:"#e2e8f0",border:"1px solid #334155",borderRadius:8,padding:"10px 12px",width:"100%",fontSize:15,boxSizing:"border-box"};
      const save=()=>{
        if(!km||!amount||!price){alert("Compila tutti i campi");return;}
        onSave({id:crypto.randomUUID(),datetime:nowISO(),fuelType,km:parseFloat(km),kmDelta,amount:parseFloat(amount),pricePerLiter:parseFloat(price),vehicle:vehicle?`${vehicle.brand} ${vehicle.model}`:""});
      };
      return (
        <Modal onClose={onClose} title="⛽ Nuovo Rifornimento">
          <div style={{marginBottom:12}}>
            <div style={{fontSize:12,color:"#94a3b8",marginBottom:4}}>📅 Data e ora</div>
            <div style={{background:"#0f172a",borderRadius:8,padding:"10px 12px",fontSize:14,color:"#64748b"}}>{new Date().toLocaleString("it-IT")} (automatico)</div>
          </div>
          {vehicle&&<div style={{marginBottom:12}}><div style={{fontSize:12,color:"#94a3b8",marginBottom:4}}>🚗 Veicolo</div><div style={{background:"#0f172a",borderRadius:8,padding:"10px 12px",fontSize:14,color:"#64748b"}}>{vehicle.brand} {vehicle.model}</div></div>}
          <div style={{marginBottom:12}}>
            <div style={{fontSize:12,color:"#94a3b8",marginBottom:4}}>⛽ Tipo carburante</div>
            <select value={fuelType} onChange={e=>setFuelType(e.target.value)} style={inp}>{FUEL_TYPES.map(f=><option key={f}>{f}</option>)}</select>
          </div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:12,color:"#94a3b8",marginBottom:4}}>🛣️ Km attuali *</div>
            <input type="number" value={km} onChange={e=>setKm(e.target.value)} placeholder="es. 45230" style={inp}/>
            {kmDelta>0&&<div style={{fontSize:12,color:"#22d3ee",marginTop:4}}>📍 Percorsi dall'ultimo: {kmDelta} km</div>}
          </div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:12,color:"#94a3b8",marginBottom:4}}>💶 Importo pagato (€) *</div>
            <input type="number" step="0.01" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="es. 65.50" style={inp}/>
          </div>
          <div style={{marginBottom:20}}>
            <div style={{fontSize:12,color:"#94a3b8",marginBottom:4}}>📊 Prezzo al litro (€/L) *</div>
            <input type="number" step="0.001" value={price} onChange={e=>setPrice(e.target.value)} placeholder="es. 1.879" style={inp}/>
          </div>
          {amount&&price&&<div style={{background:"#0f172a",borderRadius:8,padding:10,marginBottom:16,fontSize:13,color:"#94a3b8"}}>🔢 Litri stimati: <span style={{color:"#f59e0b",fontWeight:700}}>{(parseFloat(amount)/parseFloat(price)).toFixed(2)} L</span></div>}
          <button onClick={save} style={{width:"100%",background:"linear-gradient(135deg,#1e40af,#7c3aed)",color:"#fff",border:"none",borderRadius:12,padding:14,cursor:"pointer",fontSize:16,fontWeight:700}}>💾 Salva Rifornimento</button>
        </Modal>
      );
    }

    function VehicleModal({onSelect,onClose}) {
      const [makes,setMakes]=useState([]);
      const [models,setModels]=useState([]);
      const [trims,setTrims]=useState([]);
      const [selMake,setSelMake]=useState(null);
      const [selModel,setSelModel]=useState(null);
      const [selTrim,setSelTrim]=useState(null);
      const [targa,setTarga]=useState("");
      const [carburante,setCarburante]=useState("");
      const [loading,setLoading]=useState(false);
      const [search,setSearch]=useState("");
      const [step,setStep]=useState("make");
      const [err,setErr]=useState(null);

      const PROXY="https://corsproxy.io/?url=";
      const CQ="https://www.carqueryapi.com/api/0.3/";

      const fetchMakes=async()=>{
        setLoading(true);setErr(null);
        try{
          const r=await fetch(`${PROXY}${encodeURIComponent(CQ+"?cmd=getMakes&sold_in_us=0")}`);
          const txt=await r.text();
          const json=JSON.parse(txt.replace(/^\(|\);?$/g,""));
          setMakes(json.Makes||[]);
        }catch{setErr("Impossibile caricare le marche. Controlla la connessione.");}
        setLoading(false);
      };

      const fetchModels=async(makeId)=>{
        setLoading(true);setErr(null);
        try{
          const r=await fetch(`${PROXY}${encodeURIComponent(CQ+`?cmd=getModels&make=${makeId}`)}`);
          const txt=await r.text();
          const json=JSON.parse(txt.replace(/^\(|\);?$/g,""));
          setModels(json.Models||[]);
        }catch{setErr("Impossibile caricare i modelli.");}
        setLoading(false);
      };

      const fetchTrims=async(makeId,modelName)=>{
        setLoading(true);setErr(null);
        try{
          const r=await fetch(`${PROXY}${encodeURIComponent(CQ+`?cmd=getTrims&make=${makeId}&model=${encodeURIComponent(modelName)}`)}`);
          const txt=await r.text();
          const json=JSON.parse(txt.replace(/^\(|\);?$/g,""));
          setTrims(json.Trims||[]);
        }catch{setErr("Impossibile caricare le versioni.");}
        setLoading(false);
      };

      useEffect(()=>{fetchMakes();},[]);

      const filteredMakes=makes.filter(m=>m.make_display.toLowerCase().includes(search.toLowerCase()));
      const filteredModels=models.filter(m=>m.model_name.toLowerCase().includes(search.toLowerCase()));
      const inp={background:"#0f172a",color:"#e2e8f0",border:"1px solid #334155",borderRadius:8,padding:"10px 12px",width:"100%",fontSize:14,boxSizing:"border-box",marginBottom:10};

      const confirm=()=>{
        if(!selMake||!selModel) return;
        const fuel=carburante||(selTrim?fuelLabel(selTrim.model_engine_type):"N/D");
        const yearRange=selTrim?selTrim.model_year:"";
        onSelect({brand:selMake.make_display,model:selModel.model_name,year:yearRange,fuel,targa:targa.toUpperCase()});
      };

      return (
        <Modal onClose={onClose} title="🔍 Cerca Veicolo">
          <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
            {[
              {s:"make",label:selMake?selMake.make_display:"Marca"},
              selMake&&{s:"model",label:selModel?selModel.model_name:"Modello"},
              selModel&&{s:"trim",label:selTrim?`${selTrim.model_year}`:"Versione"},
              selModel&&{s:"confirm",label:"✅ Conferma"},
            ].filter(Boolean).map((b,i)=>(
              <button key={i} onClick={()=>setStep(b.s)} style={{background:step===b.s?"#7c3aed":"#334155",color:"#e2e8f0",border:"none",borderRadius:20,padding:"4px 12px",cursor:"pointer",fontSize:12,fontWeight:step===b.s?700:400}}>{b.label}</button>
            ))}
          </div>
          {err&&<div style={{background:"#7f1d1d",borderRadius:8,padding:10,fontSize:13,marginBottom:10,color:"#fca5a5"}}>⚠️ {err}</div>}
          {step==="make"&&<>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Filtra marca... (es. Fiat)" style={inp}/>
            {loading&&<div style={{color:"#64748b",fontSize:13,textAlign:"center",padding:20}}>⏳ Caricamento...</div>}
            <div style={{maxHeight:320,overflowY:"auto"}}>
              {filteredMakes.map((m,i)=>(
                <div key={i} onClick={()=>{setSelMake(m);setSelModel(null);setSelTrim(null);setSearch("");setStep("model");fetchModels(m.make_id);}}
                  style={{background:"#0f172a",borderRadius:10,padding:"11px 14px",marginBottom:6,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontWeight:600,fontSize:14}}>{m.make_display}</span>
                  <span style={{color:"#7c3aed"}}>›</span>
                </div>
              ))}
            </div>
          </>}
          {step==="model"&&<>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder={`Modello ${selMake?.make_display}...`} style={inp}/>
            {loading&&<div style={{color:"#64748b",fontSize:13,textAlign:"center",padding:20}}>⏳ Caricamento...</div>}
            <div style={{maxHeight:320,overflowY:"auto"}}>
              {filteredModels.map((m,i)=>(
                <div key={i} onClick={()=>{setSelModel(m);setSelTrim(null);setSearch("");setStep("trim");fetchTrims(selMake.make_id,m.model_name);}}
                  style={{background:"#0f172a",borderRadius:10,padding:"11px 14px",marginBottom:6,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontWeight:600,fontSize:14}}>{m.model_name}</span>
                  <span style={{color:"#7c3aed"}}>›</span>
                </div>
              ))}
            </div>
          </>}
          {step==="trim"&&<>
            <div style={{fontSize:13,color:"#94a3b8",marginBottom:8}}>Seleziona versione (opzionale)</div>
            {loading&&<div style={{color:"#64748b",fontSize:13,textAlign:"center",padding:20}}>⏳ Caricamento...</div>}
            <div style={{maxHeight:260,overflowY:"auto"}}>
              <div onClick={()=>{setSelTrim(null);setStep("confirm");}} style={{background:"#0f172a",borderRadius:10,padding:"11px 14px",marginBottom:6,cursor:"pointer",border:"1px dashed #334155"}}>
                <span style={{fontSize:13,color:"#64748b"}}>⏭ Salta — inserirò manualmente</span>
              </div>
              {trims.map((t,i)=>(
                <div key={i} onClick={()=>{setSelTrim(t);setCarburante(fuelLabel(t.model_engine_type));setStep("confirm");}}
                  style={{background:"#0f172a",borderRadius:10,padding:"11px 14px",marginBottom:6,cursor:"pointer"}}>
                  <div style={{fontWeight:600,fontSize:13}}>{t.model_year} · {t.model_trim||"—"}</div>
                  <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{t.model_engine_cc?`${t.model_engine_cc}cc`:""} {t.model_engine_power_hp?`· ${t.model_engine_power_hp} hp`:""} · {fuelLabel(t.model_engine_type)}</div>
                </div>
              ))}
            </div>
          </>}
          {step==="confirm"&&<>
            <div style={{background:"#0f172a",borderRadius:10,padding:14,marginBottom:14}}>
              <div style={{fontSize:18,fontWeight:700}}>{selMake?.make_display} {selModel?.model_name}</div>
              {selTrim&&<div style={{fontSize:13,color:"#94a3b8",marginTop:4}}>{selTrim.model_year} · {selTrim.model_trim||""}</div>}
            </div>
            <div style={{fontSize:12,color:"#94a3b8",marginBottom:4}}>⛽ Tipo carburante</div>
            <select value={carburante} onChange={e=>setCarburante(e.target.value)} style={{...inp,marginBottom:12}}>
              <option value="">— Seleziona —</option>
              {FUEL_TYPES.map(f=><option key={f}>{f}</option>)}
            </select>
            <div style={{fontSize:12,color:"#94a3b8",marginBottom:4}}>🔤 Targa (opzionale)</div>
            <input value={targa} onChange={e=>setTarga(e.target.value.toUpperCase())} placeholder="es. AB123CD" maxLength={8} style={inp}/>
            <button onClick={confirm} disabled={!selMake||!selModel||!carburante}
              style={{width:"100%",background:(!selMake||!selModel||!carburante)?"#334155":"linear-gradient(135deg,#1e40af,#7c3aed)",color:"#fff",border:"none",borderRadius:12,padding:14,cursor:!carburante?"not-allowed":"pointer",fontSize:15,fontWeight:700,marginTop:4}}>
              ✅ Conferma veicolo
            </button>
          </>}
        </Modal>
      );
    }

    function ImportModal({onImport,onClose}) {
      const [csvText,setCsvText]=useState("");
      const fileRef=useRef();
      const handleFile=(e)=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setCsvText(ev.target.result);r.readAsText(f,"UTF-8");};
      return (
        <Modal onClose={onClose} title="📥 Importa CSV">
          <div style={{fontSize:13,color:"#94a3b8",marginBottom:12}}>Colonne attese:<br/><code style={{fontSize:11,color:"#f59e0b"}}>data, ora, km attuali, importo, prezzo €/litro, carburante, auto</code></div>
          <input type="file" accept=".csv" onChange={handleFile} ref={fileRef} style={{display:"none"}}/>
          <button onClick={()=>fileRef.current.click()} style={{width:"100%",background:"#334155",color:"#e2e8f0",border:"none",borderRadius:10,padding:12,cursor:"pointer",fontSize:14,marginBottom:12}}>📂 Scegli file CSV</button>
          {csvText&&<>
            <div style={{background:"#0f172a",borderRadius:8,padding:10,fontSize:11,color:"#64748b",maxHeight:120,overflowY:"auto",marginBottom:12,fontFamily:"monospace"}}>{csvText.slice(0,500)}{csvText.length>500?"...":""}</div>
            <button onClick={()=>onImport(csvText)} style={{width:"100%",background:"linear-gradient(135deg,#1e40af,#7c3aed)",color:"#fff",border:"none",borderRadius:12,padding:14,cursor:"pointer",fontSize:15,fontWeight:700}}>✅ Importa {csvText.split("\n").length-1} righe</button>
          </>}
        </Modal>
      );
    }

    function App() {
      const [tab,setTab]=useState("dashboard");
      const [refuels,setRefuels]=useStorage("refuels",[]);
      const [vehicle,setVehicle]=useStorage("vehicle",null);
      const [showAdd,setShowAdd]=useState(false);
      const [showVehicle,setShowVehicle]=useState(false);
      const [showImport,setShowImport]=useState(false);
      const [notif,setNotif]=useState(null);

      const notify=(msg,type="success")=>{setNotif({msg,type});setTimeout(()=>setNotif(null),3000);};
      const addRefuel=(r)=>{const s=[...refuels,r].sort((a,b)=>new Date(a.datetime)-new Date(b.datetime));setRefuels(s);notify("Rifornimento aggiunto!");};
      const deleteRefuel=(id)=>{setRefuels(p=>p.filter(r=>r.id!==id));notify("Eliminato","error");};

      const importCSV=(text)=>{
        try{
          const lines=text.trim().split("\n");
          const header=lines[0].split(",").map(h=>h.trim().toLowerCase());
          const imported=[];
          for(let i=1;i<lines.length;i++){
            const cols=lines[i].split(",").map(c=>c.trim().replace(/"/g,""));
            if(cols.length<3)continue;
            const obj={};header.forEach((h,idx)=>obj[h]=cols[idx]||"");
            const dateStr=obj["data"]||obj["date"]||"";
            const timeStr=obj["ora"]||obj["time"]||"00:00";
            let dt;try{const[d,m,y]=dateStr.split("/");dt=new Date(`${y}-${m}-${d}T${timeStr}:00`).toISOString();}catch{dt=nowISO();}
            imported.push({id:crypto.randomUUID(),datetime:dt,fuelType:obj["carburante"]||obj["fuel"]||"Benzina",km:parseFloat(obj["km"]||obj["km attuali"]||0),kmDelta:parseFloat(obj["km distanza percorsa"]||obj["kmdistanza percorsa"]||0),amount:parseFloat(obj["importo"]||0),pricePerLiter:parseFloat(obj["prezzo €/litro"]||obj["prezzo"]||0),vehicle:obj["auto"]||obj["veicolo"]||(vehicle?`${vehicle.brand} ${vehicle.model}`:"")});
          }
          const merged=[...refuels,...imported].sort((a,b)=>new Date(a.datetime)-new Date(b.datetime));
          setRefuels(merged);notify(`${imported.length} rifornimenti importati!`);setShowImport(false);
        }catch{notify("Errore importazione","error");}
      };

      const exportCSV=()=>{
        const h="data,ora,km attuali,km distanza percorsa,importo,prezzo €/litro,carburante,auto";
        const rows=refuels.map(r=>`${formatDate(r.datetime)},${formatTime(r.datetime)},${r.km},${r.kmDelta},${r.amount},${r.pricePerLiter},${r.fuelType},"${r.vehicle||""}"`);
        const blob=new Blob([[h,...rows].join("\n")],{type:"text/csv"});
        const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="rifornimenti.csv";a.click();
      };

      const totalSpent=refuels.reduce((s,r)=>s+(r.amount||0),0);
      const totalKm=refuels.length>1?refuels[refuels.length-1].km-refuels[0].km:0;
      const avgPrice=refuels.length?refuels.reduce((s,r)=>s+(r.pricePerLiter||0),0)/refuels.length:0;
      const valid=refuels.filter(r=>r.amount>0&&r.kmDelta>0&&r.pricePerLiter>0);
      const avgCons=valid.length?valid.reduce((s,r)=>s+(r.amount/r.pricePerLiter/r.kmDelta*100),0)/valid.length:0;

      const tabs=[{id:"dashboard",label:"📊",title:"Dashboard"},{id:"stats",label:"📈",title:"Statistiche"},{id:"history",label:"📋",title:"Storico"},{id:"vehicle",label:"🚗",title:"Veicolo"}];

      return (
        <div style={{fontFamily:"system-ui,sans-serif",background:"#0f172a",minHeight:"100vh",color:"#e2e8f0",maxWidth:480,margin:"0 auto"}}>
          <div style={{background:"linear-gradient(135deg,#1e40af,#7c3aed)",padding:"20px 16px 0",position:"sticky",top:0,zIndex:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingBottom:12}}>
              <div>
                <div style={{fontSize:20,fontWeight:700}}>⛽ Fuel Tracker</div>
                {vehicle&&<div style={{fontSize:12,opacity:.85,marginTop:2}}>{vehicle.brand} {vehicle.model}{vehicle.targa?` · ${vehicle.targa}`:""}</div>}
              </div>
              <button onClick={()=>setShowAdd(true)} style={{background:"#f59e0b",color:"#000",border:"none",borderRadius:12,padding:"10px 16px",fontWeight:700,cursor:"pointer",fontSize:14}}>+ Rifornimento</button>
            </div>
            <div style={{display:"flex"}}>
              {tabs.map(t=>(
                <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"transparent",color:"#fff",border:"none",borderBottom:tab===t.id?"3px solid #f59e0b":"3px solid transparent",padding:"8px 4px",cursor:"pointer",fontSize:12,fontWeight:tab===t.id?700:400}}>
                  {t.label} {t.title}
                </button>
              ))}
            </div>
          </div>

          {notif&&<div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",background:notif.type==="error"?"#dc2626":"#16a34a",color:"#fff",borderRadius:10,padding:"10px 20px",zIndex:999,fontSize:14,fontWeight:600,boxShadow:"0 4px 20px rgba(0,0,0,0.4)"}}>{notif.msg}</div>}

          <div style={{padding:16}}>
            {tab==="dashboard"&&<DashboardTab refuels={refuels} totalSpent={totalSpent} totalKm={totalKm} avgPrice={avgPrice} avgCons={avgCons} onImport={()=>setShowImport(true)} onExport={exportCSV}/>}
            {tab==="stats"&&<StatsTab refuels={refuels}/>}
            {tab==="history"&&<HistoryTab refuels={refuels} onDelete={deleteRefuel}/>}
            {tab==="vehicle"&&<VehicleTab vehicle={vehicle} onRemove={()=>{setVehicle(null);notify("Veicolo rimosso","error");}} onOpen={()=>setShowVehicle(true)}/>}
          </div>

          {showAdd&&<AddRefuelModal vehicle={vehicle} lastKm={refuels.length?refuels[refuels.length-1].km:0} onSave={r=>{addRefuel(r);setShowAdd(false);}} onClose={()=>setShowAdd(false)}/>}
          {showVehicle&&<VehicleModal onSelect={v=>{setVehicle(v);notify(`Veicolo: ${v.brand} ${v.model}`);setShowVehicle(false);}} onClose={()=>setShowVehicle(false)}/>}
          {showImport&&<ImportModal onImport={importCSV} onClose={()=>setShowImport(false)}/>}
        </div>
      );
    }

    function DashboardTab({refuels,totalSpent,totalKm,avgPrice,avgCons,onImport,onExport}) {
      return (
        <div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
            {[
              {label:"Totale speso",value:`€ ${totalSpent.toFixed(2)}`,icon:"💶"},
              {label:"Km percorsi",value:`${totalKm.toFixed(0)} km`,icon:"🛣️"},
              {label:"Prezzo medio",value:`€ ${avgPrice.toFixed(3)}/L`,icon:"📈"},
              {label:"Consumo medio",value:avgCons>0?`${avgCons.toFixed(1)} L/100km`:"N/D",icon:"⚡"},
            ].map((s,i)=>(
              <div key={i} style={{background:"#1e293b",borderRadius:14,padding:16}}>
                <div style={{fontSize:22}}>{s.icon}</div>
                <div style={{fontSize:18,fontWeight:700,marginTop:6}}>{s.value}</div>
                <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{s.label}</div>
              </div>
            ))}
          </div>
          <div style={{background:"#1e293b",borderRadius:14,padding:16,marginBottom:16}}>
            <div style={{fontWeight:700,marginBottom:10,fontSize:14}}>📅 Ultimi rifornimenti</div>
            {refuels.length===0&&<div style={{color:"#64748b",fontSize:13}}>Nessun rifornimento. Aggiungine uno!</div>}
            {[...refuels].slice(-5).reverse().map(r=>(
              <div key={r.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #334155"}}>
                <div>
                  <div style={{fontSize:13,fontWeight:600}}>{formatDate(r.datetime)} · {r.fuelType}</div>
                  <div style={{fontSize:11,color:"#94a3b8"}}>{r.kmDelta>0?`+${r.kmDelta} km`:""} {r.vehicle?`· ${r.vehicle}`:""}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{color:"#f59e0b",fontWeight:700}}>€ {(r.amount||0).toFixed(2)}</div>
                  <div style={{fontSize:11,color:"#94a3b8"}}>€ {(r.pricePerLiter||0).toFixed(3)}/L</div>
                </div>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={onImport} style={{flex:1,background:"#334155",color:"#e2e8f0",border:"none",borderRadius:10,padding:12,cursor:"pointer",fontSize:13,fontWeight:600}}>📥 Importa CSV</button>
            <button onClick={onExport} style={{flex:1,background:"#334155",color:"#e2e8f0",border:"none",borderRadius:10,padding:12,cursor:"pointer",fontSize:13,fontWeight:600}}>📤 Esporta CSV</button>
          </div>
        </div>
      );
    }

    function StatsTab({refuels}) {
      const [statsView,setStatsView]=useState("km_year");
      const [selectedYear,setSelectedYear]=useState(null);
      const years=useMemo(()=>{const s=new Set(refuels.map(r=>new Date(r.datetime).getFullYear()));return[...s].sort();},[refuels]);
      const activeYear=selectedYear||(years.length?years[years.length-1]:new Date().getFullYear());

      const kmByYear=useMemo(()=>{const map={};refuels.forEach(r=>{const y=new Date(r.datetime).getFullYear();if(!map[y])map[y]={min:Infinity,max:-Infinity};if(r.km>0){map[y].min=Math.min(map[y].min,r.km);map[y].max=Math.max(map[y].max,r.km);}});return Object.entries(map).map(([y,v])=>({label:y,value:v.max===-Infinity?0:v.max-(v.min===Infinity?0:v.min)})).sort((a,b)=>a.label-b.label);},[refuels]);
      const kmByMonth=useMemo(()=>{const map={};refuels.filter(r=>new Date(r.datetime).getFullYear()===activeYear&&r.kmDelta>0).forEach(r=>{const m=new Date(r.datetime).getMonth();map[m]=(map[m]||0)+r.kmDelta;});return MONTHS_IT.map((l,i)=>({label:l,value:map[i]||0}));},[refuels,activeYear]);
      const priceTrendMonth=useMemo(()=>{const map={};refuels.filter(r=>new Date(r.datetime).getFullYear()===activeYear&&r.pricePerLiter>0).forEach(r=>{const m=new Date(r.datetime).getMonth();if(!map[m])map[m]=[];map[m].push(r.pricePerLiter);});return MONTHS_IT.map((l,i)=>({label:l,value:map[i]?map[i].reduce((s,v)=>s+v,0)/map[i].length:0}));},[refuels,activeYear]);
      const priceTrendYear=useMemo(()=>{const map={};refuels.filter(r=>r.pricePerLiter>0).forEach(r=>{const y=new Date(r.datetime).getFullYear();if(!map[y])map[y]=[];map[y].push(r.pricePerLiter);});return Object.entries(map).map(([y,arr])=>({label:y,value:arr.reduce((s,v)=>s+v,0)/arr.length})).sort((a,b)=>a.label-b.label);},[refuels]);
      const spesaByMonth=useMemo(()=>{const map={};refuels.filter(r=>new Date(r.datetime).getFullYear()===activeYear).forEach(r=>{const m=new Date(r.datetime).getMonth();map[m]=(map[m]||0)+(r.amount||0);});return MONTHS_IT.map((l,i)=>({label:l,value:map[i]||0}));},[refuels,activeYear]);
      const spesaByYear=useMemo(()=>{const map={};refuels.forEach(r=>{const y=new Date(r.datetime).getFullYear();map[y]=(map[y]||0)+(r.amount||0);});return Object.entries(map).map(([y,v])=>({label:y,value:v})).sort((a,b)=>a.label-b.label);},[refuels]);
      const consumoByMonth=useMemo(()=>{const map={};refuels.filter(r=>new Date(r.datetime).getFullYear()===activeYear&&r.amount>0&&r.kmDelta>0&&r.pricePerLiter>0).forEach(r=>{const m=new Date(r.datetime).getMonth();if(!map[m])map[m]=[];map[m].push(r.amount/r.pricePerLiter/r.kmDelta*100);});return MONTHS_IT.map((l,i)=>({label:l,value:map[i]?map[i].reduce((s,v)=>s+v,0)/map[i].length:0}));},[refuels,activeYear]);

      const views=[{id:"km_year",label:"🛣️ Km/Anno"},{id:"km_month",label:"📅 Km/Mese"},{id:"price_month",label:"💶 Prezzo/Mese"},{id:"price_year",label:"📈 Prezzo/Anno"},{id:"spesa_month",label:"🧾 Spesa/Mese"},{id:"spesa_year",label:"🧾 Spesa/Anno"},{id:"consumo",label:"⚡ Consumo"}];
      const needsYear=["km_month","price_month","spesa_month","consumo"].includes(statsView);

      if(refuels.length===0) return <div style={{textAlign:"center",color:"#64748b",padding:40}}><div style={{fontSize:48}}>📊</div><div style={{marginTop:12}}>Aggiungi rifornimenti per vedere le statistiche!</div></div>;

      return (
        <div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
            {views.map(v=><button key={v.id} onClick={()=>setStatsView(v.id)} style={{background:statsView===v.id?"#7c3aed":"#1e293b",color:"#e2e8f0",border:"none",borderRadius:20,padding:"6px 12px",cursor:"pointer",fontSize:12,fontWeight:statsView===v.id?700:400}}>{v.label}</button>)}
          </div>
          {needsYear&&<div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>{years.map(y=><button key={y} onClick={()=>setSelectedYear(y)} style={{background:activeYear===y?"#f59e0b":"#1e293b",color:activeYear===y?"#000":"#e2e8f0",border:"none",borderRadius:20,padding:"5px 14px",cursor:"pointer",fontSize:13,fontWeight:700}}>{y}</button>)}</div>}
          {statsView==="km_year"&&<StatCard title="🛣️ Km percorsi per anno" sub="Distanza totale anno per anno"><BarChart data={kmByYear} color="#3b82f6" valueFormatter={v=>v>0?`${(v/1000).toFixed(1)}k`:"0"}/><StatTable rows={kmByYear.map(d=>({Anno:d.label,"Km percorsi":d.value>0?`${d.value.toLocaleString("it-IT")} km`:"N/D"}))}/></StatCard>}
          {statsView==="km_month"&&<StatCard title={`📅 Km/mese — ${activeYear}`} sub="Distanza mensile"><BarChart data={kmByMonth} color="#3b82f6" valueFormatter={v=>v>0?`${v}`:"–"}/><StatTable rows={kmByMonth.filter(d=>d.value>0).map(d=>({Mese:d.label,"Km":`${d.value.toLocaleString("it-IT")} km`}))}/></StatCard>}
          {statsView==="price_month"&&<StatCard title={`💶 Prezzo/mese — ${activeYear}`} sub="Prezzo medio al litro per mese"><LineChart data={priceTrendMonth} color="#f59e0b" valueFormatter={v=>v>0?`${v.toFixed(3)}`:"–"}/><StatTable rows={priceTrendMonth.filter(d=>d.value>0).map(d=>({Mese:d.label,"€/L":`€ ${d.value.toFixed(3)}`}))}/></StatCard>}
          {statsView==="price_year"&&<StatCard title="📈 Prezzo carburante/anno" sub="Prezzo medio al litro per anno"><LineChart data={priceTrendYear} color="#f59e0b" valueFormatter={v=>v>0?`${v.toFixed(3)}`:"–"}/><StatTable rows={priceTrendYear.map(d=>({Anno:d.label,"€/L medio":`€ ${d.value.toFixed(3)}`}))}/></StatCard>}
          {statsView==="spesa_month"&&<StatCard title={`🧾 Spesa/mese — ${activeYear}`} sub="Importo mensile carburante"><BarChart data={spesaByMonth} color="#ec4899" valueFormatter={v=>v>0?`${v.toFixed(0)}`:"–"}/><StatTable rows={spesaByMonth.filter(d=>d.value>0).map(d=>({Mese:d.label,Spesa:`€ ${d.value.toFixed(2)}`}))}/></StatCard>}
          {statsView==="spesa_year"&&<StatCard title="🧾 Spesa totale/anno" sub="Quanto hai speso per carburante ogni anno"><BarChart data={spesaByYear} color="#ec4899" valueFormatter={v=>`€${v.toFixed(0)}`}/><StatTable rows={spesaByYear.map(d=>({Anno:d.label,Spesa:`€ ${d.value.toFixed(2)}`}))}/></StatCard>}
          {statsView==="consumo"&&<StatCard title={`⚡ Consumo/mese — ${activeYear}`} sub="Litri ogni 100 km per mese"><LineChart data={consumoByMonth} color="#22d3ee" valueFormatter={v=>v>0?`${v.toFixed(1)}`:"–"}/><StatTable rows={consumoByMonth.filter(d=>d.value>0).map(d=>({Mese:d.label,"L/100km":`${d.value.toFixed(2)} L`}))}/></StatCard>}
        </div>
      );
    }

    function HistoryTab({refuels,onDelete}) {
      return (
        <div>
          <div style={{fontWeight:700,marginBottom:12}}>📋 Storico ({refuels.length})</div>
          {refuels.length===0&&<div style={{color:"#64748b",fontSize:13}}>Nessun rifornimento registrato.</div>}
          {[...refuels].reverse().map(r=>(
            <div key={r.id} style={{background:"#1e293b",borderRadius:12,padding:14,marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div>
                  <div style={{fontWeight:700,fontSize:15}}>{formatDate(r.datetime)} {formatTime(r.datetime)}</div>
                  <div style={{fontSize:12,color:"#94a3b8",marginTop:2}}>{r.fuelType}{r.vehicle?` · ${r.vehicle}`:""}</div>
                </div>
                <button onClick={()=>onDelete(r.id)} style={{background:"transparent",border:"none",color:"#ef4444",cursor:"pointer",fontSize:18,padding:0}}>🗑️</button>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginTop:10}}>
                {[{l:"Km attuali",v:r.km?`${r.km.toLocaleString("it-IT")} km`:"-"},{l:"Percorsi",v:r.kmDelta>0?`+${r.kmDelta} km`:"-"},{l:"Importo",v:`€ ${(r.amount||0).toFixed(2)}`}].map((x,i)=>(
                  <div key={i} style={{background:"#0f172a",borderRadius:8,padding:8,textAlign:"center"}}>
                    <div style={{fontSize:13,fontWeight:700,color:"#f59e0b"}}>{x.v}</div>
                    <div style={{fontSize:10,color:"#64748b",marginTop:2}}>{x.l}</div>
                  </div>
                ))}
              </div>
              <div style={{marginTop:8,fontSize:12,color:"#94a3b8"}}>€ {(r.pricePerLiter||0).toFixed(3)}/litro</div>
            </div>
          ))}
        </div>
      );
    }

    function VehicleTab({vehicle,onRemove,onOpen}) {
      return (
        <div>
          <div style={{fontWeight:700,marginBottom:12}}>🚗 Il mio Veicolo</div>
          {vehicle?(
            <div style={{background:"#1e293b",borderRadius:14,padding:20,marginBottom:16}}>
              <div style={{fontSize:22,marginBottom:8}}>🚘</div>
              <div style={{fontSize:20,fontWeight:700}}>{vehicle.brand} {vehicle.model}</div>
              <div style={{color:"#94a3b8",marginTop:4}}>{vehicle.year&&`${vehicle.year} · `}{vehicle.fuel}{vehicle.targa&&` · ${vehicle.targa}`}</div>
              <button onClick={onRemove} style={{marginTop:14,background:"#dc2626",color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",cursor:"pointer",fontSize:13}}>Rimuovi veicolo</button>
            </div>
          ):(
            <div style={{background:"#1e293b",borderRadius:14,padding:20,marginBottom:16,color:"#64748b"}}>Nessun veicolo selezionato.</div>
          )}
          <button onClick={onOpen} style={{width:"100%",background:"linear-gradient(135deg,#1e40af,#7c3aed)",color:"#fff",border:"none",borderRadius:12,padding:14,cursor:"pointer",fontSize:15,fontWeight:700}}>
            🔍 Seleziona veicolo (CarQuery API)
          </button>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
