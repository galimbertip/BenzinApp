// ─── Helpers ─────────────────────────────────────────────────────────────────
const fmtDate = d => d ? new Date(d).toLocaleDateString("it-IT") : "";
const fmtTime = d => d ? new Date(d).toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"}) : "";
const nowISO  = () => new Date().toISOString();

function parseNum(raw) {
  if (!raw || !raw.trim()) return null;
  let s = raw.trim().replace(/[€$£\s]/g,"");
  if (/^\d{1,3}(\.\d{3})+(,\d+)?$/.test(s)) s = s.replace(/\./g,"").replace(",",".");
  else if (/^\d+(,\d+)$/.test(s)) s = s.replace(",",".");
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}

function detectSep(line) {
  const t=(line.match(/\t/g)||[]).length, sc=(line.match(/;/g)||[]).length, cc=(line.match(/,/g)||[]).length;
  if(t>=sc&&t>=cc) return "\t";
  return sc>cc ? ";" : ",";
}

function splitLine(line, sep) {
  const res=[]; let cur="", inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){inQ=!inQ;continue;}
    if(c===sep&&!inQ){res.push(cur.trim());cur="";continue;}
    cur+=c;
  }
  res.push(cur.trim());
  return res;
}

function parseCSV(text) {
  text = text.replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  const lines = text.trim().split("\n").filter(l=>l.trim());
  if(lines.length<2) return {rows:[],warnings:[{line:1,warnings:["File vuoto o con una sola riga"]}],sepName:"–"};
  const sep = detectSep(lines[0]);
  const sepName = sep==="\t"?"tab (Excel)":sep===";"?"punto e virgola (;)":"virgola (,)";
  const header = splitLine(lines[0],sep).map(h=>h.toLowerCase().replace(/['"]/g,"").trim());
  const rows=[], warnings=[];

  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim()) continue;
    const cols = splitLine(lines[i],sep);
    const o={}; header.forEach((h,idx)=>o[h]=(cols[idx]||"").trim());
    const warn=[];

    const dateStr = o["data"]||o["date"]||"";
    const timeStr = o["ora"]||o["time"]||"";
    let dt=null;
    if(dateStr){
      try{
        let d,m,y;
        if(/\d{4}-\d{2}-\d{2}/.test(dateStr)){[y,m,d]=dateStr.split("-");}
        else{[d,m,y]=dateStr.split(/[\/\-]/);}
        const tp=timeStr?timeStr.slice(0,5):"00:00";
        const c=new Date(`${y}-${m.padStart(2,"0")}-${d.padStart(2,"0")}T${tp}:00`);
        if(isNaN(c)) throw 0;
        dt=c.toISOString();
      }catch{warn.push(`⚠️ data non riconosciuta: "${dateStr}"`);}
    }

    const kmRaw    = o["km attuali"]||o["km"]||"";
    const amtRaw   = o["importo"]||"";
    const priceRaw = o["prezzo €/litro"]||o["prezzo €/l"]||o["prezzo/litro"]||o["prezzo"]||"";
    const deltaRaw = o["km distanza percorsa"]||o["kmdistanza percorsa"]||o["distanza"]||"";

    const km    = parseNum(kmRaw);
    const amount= parseNum(amtRaw);
    const price = parseNum(priceRaw);
    const kmDelta=parseNum(deltaRaw);

    if(kmRaw&&km===null)    warn.push(`⚠️ km non validi: "${kmRaw}"`);
    if(amtRaw&&amount===null) warn.push(`⚠️ importo non valido: "${amtRaw}"`);
    if(priceRaw&&price===null) warn.push(`⚠️ prezzo non valido: "${priceRaw}"`);

    const vRaw = o["auto"]||o["veicolo"]||"";
    const id   = btoa([dateStr,kmRaw,amtRaw,priceRaw,i].join("|")).replace(/[^a-zA-Z0-9]/g,"").slice(0,28);

    rows.push({id,datetime:dt,fuelType:o["carburante"]||o["fuel"]||"Benzina",km,kmDelta,amount,pricePerLiter:price,vehicle:vRaw,_vRaw:vRaw});
    if(warn.length) warnings.push({line:i+1,warnings:warn});
  }

  // ricalcola kmDelta mancanti
  for(let i=1;i<rows.length;i++){
    if(!rows[i].kmDelta&&rows[i].km&&rows[i-1].km){
      const d=rows[i].km-rows[i-1].km;
      if(d>0) rows[i].kmDelta=d;
    }
  }
  return {rows,warnings,sepName};
}

// ─── Firebase hooks ───────────────────────────────────────────────────────────
function useFirestore(){
  const [ready,setReady]=useState(!!window.__fb);
  useEffect(()=>{if(!window.__fb) window.addEventListener("fb-ready",()=>setReady(true),{once:true});},[]);
  return ready?window.__fb:null;
}

function useRefuels(fs){
  const [data,setData]=useState([]); const [loading,setLoading]=useState(true);
  useEffect(()=>{
    if(!fs) return;
    const {db,collection,query,orderBy,onSnapshot}=fs;
    return onSnapshot(query(collection(db,"refuels"),orderBy("datetime","asc")),
      snap=>{setData(snap.docs.map(d=>({id:d.id,...d.data()})));setLoading(false);},
      ()=>setLoading(false));
  },[fs]);
  return [data,loading];
}

function useVehicle(fs){
  const [v,setV]=useState(null);
  useEffect(()=>{
    if(!fs) return;
    const {db,doc,collection,onSnapshot}=fs;
    return onSnapshot(doc(collection(db,"settings"),"vehicle"),snap=>{
      const d=snap.data(); setV(d&&!d.empty?d:null);
    });
  },[fs]);
  const save=async val=>{
    const {db,doc,setDoc,collection}=fs;
    await setDoc(doc(collection(db,"settings"),"vehicle"),val||{empty:true});
  };
  return [v,save];
}

async function fbSave(fs,r){
  const {db,doc,setDoc,collection}=fs;
  await setDoc(doc(collection(db,"refuels"),r.id),r);
}
async function fbDelete(fs,id){
  const {db,doc,deleteDoc,collection}=fs;
  await deleteDoc(doc(collection(db,"refuels"),id));
}

// ─── Mini charts ──────────────────────────────────────────────────────────────
function BarChart({data,color="#f59e0b",fmt=v=>v,lk="label",vk="value"}){
  const max=Math.max(...data.map(d=>d[vk]||0),1);
  return(
    <div style={{display:"flex",alignItems:"flex-end",gap:4,height:100,marginTop:8}}>
      {data.map((d,i)=>(
        <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
          <div style={{fontSize:9,color:"#94a3b8",textAlign:"center"}}>{fmt(d[vk])}</div>
          <div style={{width:"100%",background:color,borderRadius:"4px 4px 0 0",height:`${((d[vk]||0)/max)*72}px`,minHeight:d[vk]>0?3:0}}/>
          <div style={{fontSize:9,color:"#64748b",textAlign:"center",whiteSpace:"nowrap"}}>{d[lk]}</div>
        </div>
      ))}
    </div>
  );
}

function LineChart({data,color="#22d3ee",lk="label",vk="value"}){
  const vals=data.map(d=>d[vk]||0);
  const max=Math.max(...vals,1),min=Math.min(...vals.filter(v=>v>0),max),range=max-min||1;
  const H=80,W=100;
  const pts=data.map((d,i)=>{
    const x=data.length<2?W/2:(i/(data.length-1))*W;
    const y=d[vk]>0?H-((d[vk]-min)/range)*(H-10):H;
    return `${x},${y}`;
  }).join(" ");
  return(
    <div>
      <svg viewBox={`0 0 100 ${H}`} style={{width:"100%",height:90}} preserveAspectRatio="none">
        <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round"/>
        {data.map((d,i)=>{
          const x=data.length<2?W/2:(i/(data.length-1))*W;
          const y=d[vk]>0?H-((d[vk]-min)/range)*(H-10):H;
          return d[vk]>0?<circle key={i} cx={x} cy={y} r="2.5" fill={color}/>:null;
        })}
      </svg>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
        {data.map((d,i)=><div key={i} style={{fontSize:9,color:"#64748b",textAlign:"center",flex:1}}>{d[lk]}</div>)}
      </div>
    </div>
  );
}

// ─── AddRefuelModal ───────────────────────────────────────────────────────────
function AddRefuelModal({vehicle,lastKm,onSave,onClose}){
  const [fuelType,setFuelType]=useState(vehicle?.fuel&&FUEL_TYPES.includes(vehicle.fuel)?vehicle.fuel:FUEL_TYPES[0]);
  const [km,setKm]=useState(""); const [amount,setAmount]=useState(""); const [price,setPrice]=useState("");
  const [saving,setSaving]=useState(false);
  const delta=km&&lastKm?Math.max(0,parseFloat(km)-lastKm):0;

  const save=async()=>{
    if(!km||!amount||!price){alert("Compila tutti i campi (*)");return;}
    if(parseFloat(km)<(lastKm||0)&&!confirm(`Km inseriti (${km}) < ultimi registrati (${lastKm}). Continuare?`)) return;
    setSaving(true);
    await onSave({id:crypto.randomUUID(),datetime:nowISO(),fuelType,km:parseFloat(km),kmDelta:delta,amount:parseFloat(amount),pricePerLiter:parseFloat(price),vehicle:vehicle?`${vehicle.brand} ${vehicle.model}`:""});
    setSaving(false);
  };

  return(
    <Modal title="⛽ Nuovo Rifornimento" onClose={onClose}>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:12,color:"#94a3b8",marginBottom:4}}>📅 Data e ora</div>
        <div style={{...INP,color:"#64748b",fontSize:14}}>{new Date().toLocaleString("it-IT")} (automatico)</div>
      </div>
      {vehicle&&<div style={{marginBottom:12}}>
        <div style={{fontSize:12,color:"#94a3b8",marginBottom:4}}>🚗 Veicolo</div>
        <div style={{...INP,color:"#64748b",fontSize:14}}>{vehicle.brand} {vehicle.model}{vehicle.targa?` · ${vehicle.targa}`:""}</div>
      </div>}
      <div style={{marginBottom:12}}>
        <div style={{fontSize:12,color:"#94a3b8",marginBottom:4}}>⛽ Tipo carburante</div>
        <select value={fuelType} onChange={e=>setFuelType(e.target.value)} style={INP}>{FUEL_TYPES.map(f=><option key={f}>{f}</option>)}</select>
      </div>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:12,color:"#94a3b8",marginBottom:4}}>🛣️ Km attuali *</div>
        <input type="number" value={km} onChange={e=>setKm(e.target.value)} placeholder={lastKm?`Ultimo: ${lastKm.toLocaleString("it-IT")} km`:"es. 45230"} style={INP}/>
        {delta>0&&<div style={{fontSize:12,color:"#22d3ee",marginTop:4}}>📍 Percorsi dall'ultimo: {delta.toLocaleString("it-IT")} km</div>}
      </div>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:12,color:"#94a3b8",marginBottom:4}}>💶 Importo pagato (€) *</div>
        <input type="number" step="0.01" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="es. 65.50" style={INP}/>
      </div>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:12,color:"#94a3b8",marginBottom:4}}>📊 Prezzo al litro (€/L) *</div>
        <input type="number" step="0.001" value={price} onChange={e=>setPrice(e.target.value)} placeholder="es. 1.879" style={INP}/>
      </div>
      {amount&&price&&<div style={{background:"#0f172a",borderRadius:8,padding:10,marginBottom:16,fontSize:13,color:"#94a3b8"}}>
        🔢 Litri stimati: <span style={{color:"#f59e0b",fontWeight:700}}>{(parseFloat(amount)/parseFloat(price)).toFixed(2)} L</span>
      </div>}
      <button onClick={save} disabled={saving} style={{width:"100%",background:saving?"#334155":"linear-gradient(135deg,#1e40af,#7c3aed)",color:"#fff",border:"none",borderRadius:12,padding:14,cursor:saving?"not-allowed":"pointer",fontSize:16,fontWeight:700}}>

}

// ─── ImportModal ──────────────────────────────────────────────────────────────
function ImportModal({onImport,onClose,existingVehicle,notify}){
  const [stage,setStage]=useState("upload");
  const [parsed,setParsed]=useState(null);
  const [vRes,setVRes]=useState({});
  const [importing,setImporting]=useState(false);
  const [driveLoading,setDriveLoading]=useState(false);
  const fileRef=useRef();

  const handleParsed=text=>{setParsed(parseCSV(text));setStage("preview");};

  const handleFile=e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader(); r.onload=ev=>handleParsed(ev.target.result); r.readAsText(f,"UTF-8");
  };

  const openDrive=()=>{
    if(!window.google?.accounts?.oauth2){notify("❌ Google API non caricata, riprova tra un secondo","error");return;}
    setDriveLoading(true);
    const client = window.google.accounts.oauth2.initTokenClient({
      client_id: GDRIVE_CLIENT_ID,
      scope: GDRIVE_SCOPE,
      callback: async tokenResp => {
        if(tokenResp.error){notify("❌ Accesso Drive negato","error");setDriveLoading(false);return;}
        const token = tokenResp.access_token;
        window.gapi.load("picker",()=>{
          setDriveLoading(false);
          new window.google.picker.PickerBuilder()
            .addView(new window.google.picker.DocsView()
              .setMimeTypes("text/csv,text/plain,application/vnd.google-apps.spreadsheet"))
            .setOAuthToken(token)
            .setCallback(async data=>{
              if(data.action!==window.google.picker.Action.PICKED) return;
              const file=data.docs[0];
              try{
                const url=file.mimeType==="application/vnd.google-apps.spreadsheet"
                  ?`https://www.googleapis.com/drive/v3/files/${file.id}/export?mimeType=text/csv`
                  :`https://www.googleapis.com/drive/v3/files/${file.id}?alt=media`;
                const res=await fetch(url,{headers:{Authorization:`Bearer ${token}`}});
                handleParsed(await res.text());
              }catch(e){notify("❌ Errore lettura Drive: "+e.message,"error");}
            }).build().setVisible(true);
        });
      },
    });
    client.requestAccessToken();
  };

  const doImport=async()=>{
    setImporting(true);
    await onImport(parsed.rows.map(r=>({...r,vehicle:vRes[r._vRaw]??r._vRaw})));
    setImporting(false);
  };

  const uniqueVehicles=[...new Set((parsed?.rows||[]).map(r=>r._vRaw).filter(Boolean))];

  return(
    <Modal title="📥 Importa CSV" onClose={onClose}>
      {stage==="upload"&&<>
        {/* Guida struttura */}
        <div style={{background:"#0f172a",borderRadius:12,padding:14,marginBottom:16}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:10,color:"#f59e0b"}}>📋 Struttura CSV attesa</div>
          {[
            ["Separatore","virgola (,) o punto e virgola (;) o tab — rilevato automaticamente"],
            ["Formato data","GG/MM/AAAA (es. 15/03/2023)"],
            ["Formato ora","HH:MM (es. 08:30) — opzionale"],
            ["Decimali","punto (1.879) o virgola (1,879) — entrambi accettati"],
            ["Campi obbligatori","nessuno — i campi mancanti restano vuoti"],
          ].map(([k,v],i)=><div key={i} style={{fontSize:12,marginBottom:5}}><span style={{color:"#e2e8f0",fontWeight:600}}>{k}:</span> <span style={{color:"#94a3b8"}}>{v}</span></div>)}
          <div style={{fontSize:11,color:"#64748b",marginTop:8,marginBottom:4}}>Intestazione:</div>
          <div style={{background:"#1e293b",borderRadius:8,padding:8,fontFamily:"monospace",fontSize:10,color:"#22d3ee",overflowX:"auto",whiteSpace:"nowrap"}}>data,ora,km attuali,km distanza percorsa,importo,prezzo €/litro,carburante,auto</div>
          <div style={{fontSize:11,color:"#64748b",marginTop:6,marginBottom:4}}>Esempio:</div>
          <div style={{background:"#1e293b",borderRadius:8,padding:8,fontFamily:"monospace",fontSize:10,color:"#94a3b8",overflowX:"auto",whiteSpace:"nowrap"}}>15/03/2023,08:30,45230,312,65.50,1.879,Benzina,Fiat Tipo Cross</div>
        </div>
        <input type="file" accept=".csv,.txt" onChange={handleFile} ref={fileRef} style={{display:"none"}}/>
        <button onClick={()=>fileRef.current.click()} style={{width:"100%",background:"linear-gradient(135deg,#1e40af,#7c3aed)",color:"#fff",border:"none",borderRadius:12,padding:14,cursor:"pointer",fontSize:15,fontWeight:700,marginBottom:10}}>
          📂 Scegli file dal dispositivo
        </button>
        <button onClick={openDrive} disabled={driveLoading} style={{width:"100%",background:driveLoading?"#334155":"linear-gradient(135deg,#16a34a,#15803d)",color:"#fff",border:"none",borderRadius:12,padding:14,cursor:driveLoading?"not-allowed":"pointer",fontSize:15,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          <svg width="18" height="18" viewBox="0 0 87.3 78"><path d="M6.6 66.85l3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3l13.75-23.8H0c0 1.55.4 3.1 1.2 4.5z" fill="#0066DA"/><path d="M43.65 25L29.9 1.2C28.55 2 27.4 3.1 26.6 4.5L1.2 49.05c-.8 1.4-1.2 2.95-1.2 4.5h27.5z" fill="#00AC47"/><path d="M73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75 7.65-13.25c.8-1.4 1.2-2.95 1.2-4.5H59.8l5.85 11.5z" fill="#EA4335"/><path d="M43.65 25L57.4 1.2C56.05.4 54.5 0 52.9 0H34.4c-1.6 0-3.15.45-4.5 1.2z" fill="#00832D"/><path d="M59.8 53.55H27.5L13.75 77.35c1.35.8 2.9 1.2 4.5 1.2h50.8c1.6 0 3.15-.4 4.5-1.2z" fill="#2684FC"/><path d="M73.4 26.45l-12.65-21.9C59.95 3.1 58.8 2 57.45 1.2L43.7 25l16.15 28h27.45c0-1.55-.4-3.1-1.2-4.5z" fill="#FFBA00"/></svg>
          {driveLoading?"⏳ Apertura Drive...":"Importa da Google Drive"}
        </button>
      </>}

      {stage==="preview"&&parsed&&<>
        <div style={{background:"#0f172a",borderRadius:10,padding:8,marginBottom:12,fontSize:12,color:"#64748b"}}>
          Separatore rilevato: <code style={{color:"#f59e0b"}}>{parsed.sepName}</code>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
          <div style={{background:"#14532d",borderRadius:10,padding:12,textAlign:"center"}}>
            <div style={{fontSize:22,fontWeight:700,color:"#4ade80"}}>{parsed.rows.length}</div>
            <div style={{fontSize:12,color:"#86efac"}}>✅ Righe importabili</div>
          </div>
          <div style={{background:parsed.warnings.length?"#422006":"#1e293b",borderRadius:10,padding:12,textAlign:"center"}}>
            <div style={{fontSize:22,fontWeight:700,color:parsed.warnings.length?"#fb923c":"#64748b"}}>{parsed.warnings.length}</div>
            <div style={{fontSize:12,color:parsed.warnings.length?"#fed7aa":"#64748b"}}>⚠️ Con avvisi</div>
          </div>
        </div>

        {parsed.warnings.length>0&&<>
          <div style={{fontWeight:700,fontSize:13,marginBottom:8,color:"#fb923c"}}>⚠️ Avvisi (righe importate con campi vuoti)</div>
          <div style={{maxHeight:150,overflowY:"auto",marginBottom:12}}>
            {parsed.warnings.map((e,i)=>(
              <div key={i} style={{background:"#1c1008",borderRadius:8,padding:10,marginBottom:6,fontSize:12}}>
                <div style={{color:"#fb923c",fontWeight:700}}>Riga {e.line}</div>
                {e.warnings.map((w,j)=><div key={j} style={{color:"#fed7aa",marginTop:2}}>{w}</div>)}
              </div>
            ))}
          </div>
        </>}

        {uniqueVehicles.length>0&&<>
          <div style={{fontWeight:700,fontSize:13,marginBottom:8,color:"#f59e0b"}}>🚗 Verifica nomi veicoli</div>
          {uniqueVehicles.map(raw=>(
            <div key={raw} style={{background:"#0f172a",borderRadius:8,padding:10,marginBottom:8}}>
              <div style={{fontSize:12,color:"#94a3b8",marginBottom:6}}>CSV: <strong style={{color:"#e2e8f0"}}>"{raw}"</strong></div>
              <input value={vRes[raw]??raw} onChange={e=>setVRes(p=>({...p,[raw]:e.target.value}))} style={INP_SM}/>
              {existingVehicle&&<button onClick={()=>setVRes(p=>({...p,[raw]:`${existingVehicle.brand} ${existingVehicle.model}`}))}
                style={{marginTop:6,background:"#334155",color:"#e2e8f0",border:"none",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:11}}>
                Usa veicolo attivo: {existingVehicle.brand} {existingVehicle.model}
              </button>}
            </div>
          ))}
        </>}

        <div style={{display:"flex",gap:8,marginTop:8}}>
          <button onClick={()=>setStage("upload")} style={{flex:1,background:"#334155",color:"#e2e8f0",border:"none",borderRadius:10,padding:12,cursor:"pointer",fontSize:13}}>← Indietro</button>
          <button onClick={doImport} disabled={importing||!parsed.rows.length}
            style={{flex:2,background:!parsed.rows.length?"#334155":"linear-gradient(135deg,#1e40af,#7c3aed)",color:"#fff",border:"none",borderRadius:10,padding:12,cursor:!parsed.rows.length?"not-allowed":"pointer",fontSize:14,fontWeight:700}}>
            {importing?"⏳ Importazione...":`✅ Importa ${parsed.rows.length} righe`}
          </button>
        </div>
      </>}
    </Modal>
  );
}

// ─── ExportModal ──────────────────────────────────────────────────────────────
function ExportModal({refuels,onClose}){
  const doExport=fmt=>{
    const isIT=fmt==="excel_it";
    const sep=isIT?";":",";
    const n=v=>(v===null||v===undefined)?"":v;
    const dec=v=>isIT?n(v).toString().replace(".",","):n(v);
    const header=["data","ora","km attuali","km distanza percorsa","importo","prezzo €/litro","carburante","auto"].join(sep);
    const rows=refuels.map(r=>[fmtDate(r.datetime),fmtTime(r.datetime),dec(r.km),dec(r.kmDelta),dec(r.amount),dec(r.pricePerLiter),r.fuelType||"",`"${r.vehicle||""}"`].join(sep));
    const bom=isIT?"\uFEFF":"";
    const blob=new Blob([bom+[header,...rows].join("\n")],{type:"text/csv;charset=utf-8;"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`rifornimenti_${fmt}.csv`; a.click();
    onClose();
  };
  return(
    <Modal title="📤 Esporta CSV" onClose={onClose}>
      <div style={{fontSize:13,color:"#94a3b8",marginBottom:16}}>Scegli il formato in base a dove aprirai il file:</div>
      {[
        {id:"standard",icon:"🌐",label:"Standard / Re-import app",desc:"Virgola (,) · Punto decimale (.) · Universale"},
        {id:"excel_it",icon:"📗",label:"Excel italiano",desc:"Punto e virgola (;) · Virgola decimale (,) · BOM UTF-8"},
        {id:"gfogli",  icon:"📊",label:"Google Fogli",desc:"Virgola (,) · Punto decimale (.) · Ottimale per Sheets"},
      ].map(f=>(
        <button key={f.id} onClick={()=>doExport(f.id)} style={{width:"100%",background:"#0f172a",border:"1px solid #334155",borderRadius:12,padding:14,cursor:"pointer",marginBottom:10,textAlign:"left",color:"#e2e8f0"}}>
          <div style={{fontSize:15,fontWeight:700,marginBottom:4}}>{f.icon} {f.label}</div>
          <div style={{fontSize:12,color:"#64748b"}}>{f.desc}</div>
        </button>
      ))}
    </Modal>
  );
}

// ─── StatsTab ─────────────────────────────────────────────────────────────────
function StatsTab({refuels}){
  const [view,setView]=useState("km_year"); const [selY,setSelY]=useState(null);
  const years=useMemo(()=>[...new Set(refuels.map(r=>new Date(r.datetime||Date.now()).getFullYear()))].sort(),[refuels]);
  const yr=selY||(years.length?years[years.length-1]:new Date().getFullYear());
  const byYr=r=>new Date(r.datetime||Date.now()).getFullYear()===yr;

  const kmByYear=useMemo(()=>{const m={};refuels.forEach(r=>{const y=new Date(r.datetime||Date.now()).getFullYear();if(!m[y])m[y]={min:Infinity,max:-Infinity};if(r.km){m[y].min=Math.min(m[y].min,r.km);m[y].max=Math.max(m[y].max,r.km);}});return Object.entries(m).map(([y,v])=>({label:y,value:v.max===-Infinity?0:v.max-(v.min===Infinity?0:v.min)})).sort((a,b)=>a.label-b.label);},[refuels]);
  const kmByMonth=useMemo(()=>{const m={};refuels.filter(byYr).forEach(r=>{if(r.kmDelta){const mo=new Date(r.datetime).getMonth();m[mo]=(m[mo]||0)+r.kmDelta;}});return MONTHS_IT.map((l,i)=>({label:l,value:m[i]||0}));},[refuels,yr]);
  const priceMonth=useMemo(()=>{const m={};refuels.filter(byYr).forEach(r=>{if(r.pricePerLiter){const mo=new Date(r.datetime).getMonth();(m[mo]=m[mo]||[]).push(r.pricePerLiter);}});return MONTHS_IT.map((l,i)=>({label:l,value:m[i]?m[i].reduce((s,v)=>s+v,0)/m[i].length:0}));},[refuels,yr]);
  const priceYear=useMemo(()=>{const m={};refuels.forEach(r=>{if(r.pricePerLiter){const y=new Date(r.datetime||Date.now()).getFullYear();(m[y]=m[y]||[]).push(r.pricePerLiter);}});return Object.entries(m).map(([y,a])=>({label:y,value:a.reduce((s,v)=>s+v,0)/a.length})).sort((a,b)=>a.label-b.label);},[refuels]);
  const spesaMonth=useMemo(()=>{const m={};refuels.filter(byYr).forEach(r=>{if(r.amount){const mo=new Date(r.datetime).getMonth();m[mo]=(m[mo]||0)+r.amount;}});return MONTHS_IT.map((l,i)=>({label:l,value:m[i]||0}));},[refuels,yr]);
  const spesaYear=useMemo(()=>{const m={};refuels.forEach(r=>{if(r.amount){const y=new Date(r.datetime||Date.now()).getFullYear();m[y]=(m[y]||0)+r.amount;}});return Object.entries(m).map(([y,v])=>({label:y,value:v})).sort((a,b)=>a.label-b.label);},[refuels]);
  const consumoMonth=useMemo(()=>{const m={};refuels.filter(byYr).forEach(r=>{if(r.amount&&r.kmDelta&&r.pricePerLiter){const mo=new Date(r.datetime).getMonth();(m[mo]=m[mo]||[]).push(r.amount/r.pricePerLiter/r.kmDelta*100);}});return MONTHS_IT.map((l,i)=>({label:l,value:m[i]?m[i].reduce((s,v)=>s+v,0)/m[i].length:0}));},[refuels,yr]);

  const VIEWS=[{id:"km_year",l:"🛣️ Km/Anno"},{id:"km_month",l:"📅 Km/Mese"},{id:"price_month",l:"💶 Prezzo/Mese"},{id:"price_year",l:"📈 Prezzo/Anno"},{id:"spesa_month",l:"🧾 Spesa/Mese"},{id:"spesa_year",l:"🧾 Spesa/Anno"},{id:"consumo",l:"⚡ Consumo"}];
  const needsYear=["km_month","price_month","spesa_month","consumo"].includes(view);

  if(!refuels.length) return <div style={{textAlign:"center",color:"#64748b",padding:40}}><div style={{fontSize:48}}>📊</div><div style={{marginTop:12}}>Aggiungi rifornimenti per le statistiche!</div></div>;

  return(<div>
    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
      {VIEWS.map(v=><button key={v.id} onClick={()=>setView(v.id)} style={{background:view===v.id?"#7c3aed":"#1e293b",color:"#e2e8f0",border:"none",borderRadius:20,padding:"6px 12px",cursor:"pointer",fontSize:12,fontWeight:view===v.id?700:400}}>{v.l}</button>)}
    </div>
    {needsYear&&<div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>{years.map(y=><button key={y} onClick={()=>setSelY(y)} style={{background:yr===y?"#f59e0b":"#1e293b",color:yr===y?"#000":"#e2e8f0",border:"none",borderRadius:20,padding:"5px 14px",cursor:"pointer",fontSize:13,fontWeight:700}}>{y}</button>)}</div>}
    {view==="km_year"&&<StatCard title="🛣️ Km/anno" sub="Distanza totale per anno"><BarChart data={kmByYear} color="#3b82f6" fmt={v=>v>0?`${(v/1000).toFixed(1)}k`:"0"}/><StatTable rows={kmByYear.map(d=>({Anno:d.label,"Km":d.value>0?`${d.value.toLocaleString("it-IT")} km`:"N/D"}))}/></StatCard>}
    {view==="km_month"&&<StatCard title={`📅 Km/mese — ${yr}`} sub="Distanza mensile"><BarChart data={kmByMonth} color="#3b82f6" fmt={v=>v>0?`${v}`:"–"}/><StatTable rows={kmByMonth.filter(d=>d.value>0).map(d=>({Mese:d.label,"Km":`${d.value.toLocaleString("it-IT")} km`}))}/></StatCard>}
    {view==="price_month"&&<StatCard title={`💶 Prezzo/mese — ${yr}`} sub="Prezzo medio al litro"><LineChart data={priceMonth} color="#f59e0b"/><StatTable rows={priceMonth.filter(d=>d.value>0).map(d=>({Mese:d.label,"€/L":`€ ${d.value.toFixed(3)}`}))}/></StatCard>}
    {view==="price_year"&&<StatCard title="📈 Prezzo/anno" sub="Prezzo medio al litro per anno"><LineChart data={priceYear} color="#f59e0b"/><StatTable rows={priceYear.map(d=>({Anno:d.label,"€/L":`€ ${d.value.toFixed(3)}`}))}/></StatCard>}
    {view==="spesa_month"&&<StatCard title={`🧾 Spesa/mese — ${yr}`} sub="Importo mensile"><BarChart data={spesaMonth} color="#ec4899" fmt={v=>v>0?`€${v.toFixed(0)}`:"–"}/><StatTable rows={spesaMonth.filter(d=>d.value>0).map(d=>({Mese:d.label,Spesa:`€ ${d.value.toFixed(2)}`}))}/></StatCard>}
    {view==="spesa_year"&&<StatCard title="🧾 Spesa/anno" sub="Spesa totale per anno"><BarChart data={spesaYear} color="#ec4899" fmt={v=>`€${v.toFixed(0)}`}/><StatTable rows={spesaYear.map(d=>({Anno:d.label,Spesa:`€ ${d.value.toFixed(2)}`}))}/></StatCard>}
    {view==="consumo"&&<StatCard title={`⚡ Consumo/mese — ${yr}`} sub="L/100km per mese"><LineChart data={consumoMonth} color="#22d3ee"/><StatTable rows={consumoMonth.filter(d=>d.value>0).map(d=>({Mese:d.label,"L/100km":`${d.value.toFixed(2)} L`}))}/></StatCard>}
  </div>);
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App(){
  const fs=useFirestore();
  const [refuels,loadingR]=useRefuels(fs);
  const [vehicle,setVehicle]=useVehicle(fs);
  const [tab,setTab]=useState("dashboard");
  const [showAdd,setShowAdd]=useState(false);
  const [showVehicle,setShowVehicle]=useState(false);
  const [showImport,setShowImport]=useState(false);
  const [showExport,setShowExport]=useState(false);
  const [notif,setNotif]=useState(null);

  const notify=(msg,type="success")=>{setNotif({msg,type});setTimeout(()=>setNotif(null),3500);};

  const handleSave=async r=>{try{await fbSave(fs,r);notify("✅ Salvato!");}catch(e){notify("❌ Errore: "+e.message,"error");}};
  const handleDelete=async id=>{if(!confirm("Eliminare?"))return;try{await fbDelete(fs,id);notify("Eliminato","error");}catch(e){notify("❌ "+e.message,"error");}};
  const handleImport=async rows=>{try{for(const r of rows)await fbSave(fs,r);notify(`✅ ${rows.length} righe importate!`);setShowImport(false);}catch(e){notify("❌ "+e.message,"error");}};

  const tot=refuels.reduce((s,r)=>s+(r.amount||0),0);
  const totKm=refuels.length>1?refuels[refuels.length-1].km-refuels[0].km:0;
  const avgP=refuels.length?refuels.reduce((s,r)=>s+(r.pricePerLiter||0),0)/refuels.length:0;
  const vc=refuels.filter(r=>r.amount&&r.kmDelta&&r.pricePerLiter);
  const avgC=vc.length?vc.reduce((s,r)=>s+r.amount/r.pricePerLiter/r.kmDelta*100,0)/vc.length:0;
  const lastKm=refuels.length?refuels[refuels.length-1].km:0;

  const TABS=[{id:"dashboard",e:"📊",t:"Dashboard"},{id:"stats",e:"📈",t:"Statistiche"},{id:"history",e:"📋",t:"Storico"},{id:"vehicle",e:"🚗",t:"Veicolo"}];

  if(!fs||loadingR) return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:16}}>
      <div style={{fontSize:48}}>⛽</div>
      <div style={{color:"#64748b"}}>{!fs?"Connessione Firebase...":"Caricamento dati..."}</div>
    </div>
  );

  return(<div style={{fontFamily:"system-ui,sans-serif",background:"#0f172a",minHeight:"100vh",color:"#e2e8f0",maxWidth:480,margin:"0 auto"}}>
    {/* Header */}
    <div style={{background:"linear-gradient(135deg,#1e40af,#7c3aed)",padding:"20px 16px 0",position:"sticky",top:0,zIndex:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingBottom:12}}>
        <div>
          <div style={{fontSize:20,fontWeight:700}}>⛽ BenzinApp</div>
          <div style={{fontSize:12,opacity:.75,marginTop:2}}>{vehicle?`${vehicle.brand} ${vehicle.model}${vehicle.targa?` · ${vehicle.targa}`:""}` : "Nessun veicolo"}</div>
        </div>
        <button onClick={()=>setShowAdd(true)} style={{background:"#f59e0b",color:"#000",border:"none",borderRadius:12,padding:"10px 16px",fontWeight:700,cursor:"pointer",fontSize:14}}>+ Rifornimento</button>
      </div>
      <div style={{display:"flex"}}>
        {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"transparent",color:"#fff",border:"none",borderBottom:tab===t.id?"3px solid #f59e0b":"3px solid transparent",padding:"8px 2px",cursor:"pointer",fontSize:11,fontWeight:tab===t.id?700:400}}>{t.e} {t.t}</button>)}
      </div>
    </div>

    {notif&&<div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",background:notif.type==="error"?"#dc2626":"#16a34a",color:"#fff",borderRadius:10,padding:"10px 20px",zIndex:999,fontSize:14,fontWeight:600,boxShadow:"0 4px 20px rgba(0,0,0,0.4)",whiteSpace:"nowrap"}}>{notif.msg}</div>}

    <div style={{padding:16}}>
      {/* DASHBOARD */}
      {tab==="dashboard"&&<>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
          {[{l:"Totale speso",v:`€ ${tot.toFixed(2)}`,i:"💶"},{l:"Km percorsi",v:`${(totKm||0).toFixed(0)} km`,i:"🛣️"},{l:"Prezzo medio",v:`€ ${avgP.toFixed(3)}/L`,i:"📈"},{l:"Consumo medio",v:avgC>0?`${avgC.toFixed(1)} L/100km`:"N/D",i:"⚡"}].map((s,i)=>(
            <div key={i} style={{background:"#1e293b",borderRadius:14,padding:16}}>
              <div style={{fontSize:22}}>{s.i}</div>
              <div style={{fontSize:18,fontWeight:700,marginTop:6}}>{s.v}</div>
              <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{s.l}</div>
            </div>
          ))}
        </div>
        <div style={{background:"#1e293b",borderRadius:14,padding:16,marginBottom:16}}>
          <div style={{fontWeight:700,marginBottom:10,fontSize:14}}>📅 Ultimi rifornimenti</div>
          {!refuels.length&&<div style={{color:"#64748b",fontSize:13}}>Nessun rifornimento. Aggiungine uno!</div>}
          {[...refuels].slice(-5).reverse().map(r=>(
            <div key={r.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #334155"}}>
              <div>
                <div style={{fontSize:13,fontWeight:600}}>{fmtDate(r.datetime)} · {r.fuelType}</div>
                <div style={{fontSize:11,color:"#94a3b8"}}>{r.kmDelta>0?`+${r.kmDelta} km`:""} {r.vehicle?`· ${r.vehicle}`:""}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{color:"#f59e0b",fontWeight:700}}>€ {(r.amount||0).toFixed(2)}</div>
                <div style={{fontSize:11,color:"#94a3b8"}}>€ {(r.pricePerLiter||0).toFixed(3)}/L</div>
              </div>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setShowImport(true)} style={{flex:1,background:"#334155",color:"#e2e8f0",border:"none",borderRadius:10,padding:12,cursor:"pointer",fontSize:13,fontWeight:600}}>📥 Importa CSV</button>
          <button onClick={()=>setShowExport(true)} style={{flex:1,background:"#334155",color:"#e2e8f0",border:"none",borderRadius:10,padding:12,cursor:"pointer",fontSize:13,fontWeight:600}}>📤 Esporta CSV</button>
        </div>
        <div style={{marginTop:8,fontSize:11,color:"#475569",textAlign:"center"}}>☁️ Sincronizzato su Firebase</div>
      </>}

      {/* STATISTICHE */}
      {tab==="stats"&&<StatsTab refuels={refuels}/>}

      {/* STORICO */}
      {tab==="history"&&<>
        <div style={{fontWeight:700,marginBottom:12}}>📋 Storico ({refuels.length})</div>
        {!refuels.length&&<div style={{color:"#64748b",fontSize:13}}>Nessun rifornimento.</div>}
        {[...refuels].reverse().map(r=>(
          <div key={r.id} style={{background:"#1e293b",borderRadius:12,padding:14,marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{fontWeight:700,fontSize:15}}>{fmtDate(r.datetime)} {fmtTime(r.datetime)}</div>
                <div style={{fontSize:12,color:"#94a3b8",marginTop:2}}>{r.fuelType}{r.vehicle?` · ${r.vehicle}`:""}</div>
              </div>
              <button onClick={()=>handleDelete(r.id)} style={{background:"transparent",border:"none",color:"#ef4444",cursor:"pointer",fontSize:18,padding:0}}>🗑️</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginTop:10}}>
              {[{l:"Km attuali",v:r.km?`${r.km.toLocaleString("it-IT")} km`:"-"},{l:"Percorsi",v:r.kmDelta>0?`+${r.kmDelta} km`:"-"},{l:"Importo",v:`€ ${(r.amount||0).toFixed(2)}`}].map((x,i)=>(
                <div key={i} style={{background:"#0f172a",borderRadius:8,padding:8,textAlign:"center"}}>
                  <div style={{fontSize:13,fontWeight:700,color:"#f59e0b"}}>{x.v}</div>
                  <div style={{fontSize:10,color:"#64748b",marginTop:2}}>{x.l}</div>
                </div>
              ))}
            </div>
            <div style={{marginTop:8,fontSize:12,color:"#94a3b8"}}>€ {(r.pricePerLiter||0).toFixed(3)}/litro</div>
          </div>
        ))}
      </>}

      {/* VEICOLO */}
      {tab==="vehicle"&&<>
        <div style={{fontWeight:700,marginBottom:12}}>🚗 Il mio Veicolo</div>
        {vehicle?(
          <div style={{background:"#1e293b",borderRadius:14,padding:20,marginBottom:16}}>
            <div style={{fontSize:22,marginBottom:8}}>🚘</div>
            <div style={{fontSize:20,fontWeight:700}}>{vehicle.brand} {vehicle.model}</div>
            <div style={{color:"#94a3b8",marginTop:4}}>{vehicle.year?`${vehicle.year} · `:""}{vehicle.fuel}{vehicle.targa?` · ${vehicle.targa}`:""}</div>
            <div style={{marginTop:8,fontSize:12,color:"#475569"}}>☁️ Sincronizzato su tutti i dispositivi</div>
            <button onClick={async()=>{await setVehicle(null);notify("Veicolo rimosso","error");}} style={{marginTop:14,background:"#dc2626",color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",cursor:"pointer",fontSize:13}}>Rimuovi veicolo</button>
          </div>
        ):<div style={{background:"#1e293b",borderRadius:14,padding:20,marginBottom:16,color:"#64748b"}}>Nessun veicolo selezionato.</div>}
        <button onClick={()=>setShowVehicle(true)} style={{width:"100%",background:"linear-gradient(135deg,#1e40af,#7c3aed)",color:"#fff",border:"none",borderRadius:12,padding:14,cursor:"pointer",fontSize:15,fontWeight:700}}>
          🔍 Seleziona veicolo
        </button>
      </>}
    </div>

    {showAdd&&<AddRefuelModal vehicle={vehicle} lastKm={lastKm} onSave={async r=>{await handleSave(r);setShowAdd(false);}} onClose={()=>setShowAdd(false)}/>}
    {showVehicle&&<VehicleModal onSelect={async v=>{await setVehicle(v);notify(`🚗 ${v.brand} ${v.model}`);setShowVehicle(false);}} onClose={()=>setShowVehicle(false)}/>}
    {showImport&&<ImportModal onImport={handleImport} onClose={()=>setShowImport(false)} existingVehicle={vehicle} notify={notify}/>}
    {showExport&&<ExportModal refuels={refuels} onClose={()=>setShowExport(false)}/>}
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
